<script>
const appState = {
  sessionToken: '',
  viewerEmail: '',
  viewerName: '',
  previewUrl: '',
  drafts: [],
  adminLog: [],
  maintenance: { storage: null, recommendations: [] },
  options: {
    roots: {},
    recruitCalendars: [],
    activityPhotoFolders: [],
    exhibitionFolders: [],
    requestPhotoFolders: []
  },
  state: {
    recruitCalendar: { folderId: '', label: '' },
    activityArticles: [],
    exhibitions: [],
    requestCases: [],
    changeLog: [],
    manualChangeNote: ''
  },
  imageCache: {},
  mediaCache: {},
  dirty: false,
  suppressDirty: false
};

document.addEventListener('DOMContentLoaded', () => {
  bindGlobalEvents();
});

function bindGlobalEvents() {
  document.getElementById('requestOtpButton').addEventListener('click', onRequestOtp);
  document.getElementById('verifyOtpButton').addEventListener('click', onVerifyOtp);
  document.getElementById('refreshDriveButton').addEventListener('click', onRefreshDriveChanges);
  document.getElementById('saveDraftButton').addEventListener('click', onSaveDraft);
  document.getElementById('publishButton').addEventListener('click', onPublish);
  document.querySelectorAll('[data-panel-target]').forEach((button) => {
    button.addEventListener('click', () => activatePanel(button.getAttribute('data-panel-target')));
  });
  document.addEventListener('input', (event) => {
    if (event.target.closest && event.target.closest('#appShell')) markDirty();
  });
  document.addEventListener('change', (event) => {
    if (event.target.closest && event.target.closest('#appShell')) markDirty();
  });
  window.addEventListener('beforeunload', (event) => {
    if (!appState.dirty) return;
    event.preventDefault();
    event.returnValue = '';
  });
}

function activatePanel(panelId) {
  document.querySelectorAll('[data-panel-target]').forEach((button) => {
    button.classList.toggle('is-active', button.getAttribute('data-panel-target') === panelId);
  });
  document.querySelectorAll('[data-panel]').forEach((panel) => {
    panel.classList.toggle('is-active', panel.getAttribute('data-panel') === panelId);
  });
  if (panelId === 'logs') {
    renderLogs();
  }
}

function setStatus(message, kind = 'default') {
  const status = document.getElementById('statusMessage');
  status.textContent = message;
  status.style.color = kind === 'error' ? '#ffd5d5' : (kind === 'success' ? '#0a0a0a' : '');
  status.style.background = kind === 'error' ? 'rgba(243,108,108,0.18)' : (kind === 'success' ? 'rgba(136,196,132,0.92)' : 'rgba(255,255,255,0.04)');
}

function setAuthStatus(message, kind = 'default') {
  const box = document.getElementById('authStatus');
  box.innerHTML = `<div>${escapeHtml(message)}</div>`;
  box.style.color = kind === 'error' ? '#ffd5d5' : (kind === 'success' ? '#0a0a0a' : 'rgba(255,255,255,0.82)');
  box.style.background = kind === 'error' ? 'rgba(243,108,108,0.18)' : (kind === 'success' ? 'rgba(136,196,132,0.92)' : 'rgba(255,255,255,0.04)');
}

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatDate(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return [
    date.getFullYear(),
    String(date.getMonth() + 1).padStart(2, '0'),
    String(date.getDate()).padStart(2, '0')
  ].join('.');
}

function optionHtml(options, selectedId, includeBlankLabel) {
  const rows = [];
  if (includeBlankLabel) {
    rows.push(`<option value="">${escapeHtml(includeBlankLabel)}</option>`);
  }
  (options || []).forEach((item) => {
    rows.push(`<option value="${escapeHtml(item.id)}" ${item.id === selectedId ? 'selected' : ''}>${escapeHtml(item.name)}</option>`);
  });
  return rows.join('');
}

function serverCall(functionName, ...args) {
  if (window.MOCK_BACKEND && typeof window.MOCK_BACKEND[functionName] === 'function') {
    return Promise.resolve(window.MOCK_BACKEND[functionName](...args));
  }
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler((error) => reject(new Error(error && error.message ? error.message : String(error))))
      [functionName](...args);
  });
}

async function getFolderImagesCached(folderId, forceRefresh = false) {
  if (!folderId) return [];

  if (!forceRefresh && appState.imageCache[folderId]) {
    return appState.imageCache[folderId];
  }

  const images = await serverCall('getFolderImages', appState.sessionToken, folderId);
  appState.imageCache[folderId] = images || [];
  return appState.imageCache[folderId];
}

async function getFolderImagesFresh(folderId) {
  return getFolderImagesCached(folderId, true);
}

async function getFolderMediaCached(folderId, forceRefresh = false) {
  if (!folderId) return [];

  if (!forceRefresh && appState.mediaCache[folderId]) {
    return appState.mediaCache[folderId];
  }

  const files = await serverCall('getFolderMedia', appState.sessionToken, folderId);
  appState.mediaCache[folderId] = files || [];
  appState.imageCache[folderId] = (files || []).filter((file) => file.kind === 'image');
  return appState.mediaCache[folderId];
}

async function getFolderMediaFresh(folderId) {
  return getFolderMediaCached(folderId, true);
}

function invalidateFolderCache(folderId) {
  if (!folderId) return;
  delete appState.imageCache[folderId];
  delete appState.mediaCache[folderId];
}

function markDirty() {
  if (appState.suppressDirty) return;
  appState.dirty = true;
}

function clearDirty() {
  appState.dirty = false;
}

let driveRefreshInFlight = false;

function syncCurrentEditorsToState() {
  try {
    if (document.getElementById('recruitCalendarFolder')) {
      appState.state.recruitCalendar = readRecruitFromDom();
    }

    if (document.querySelector('[data-activity-item]')) {
      appState.state.activityArticles = readActivitiesFromDom();
    }

    if (document.querySelector('[data-exhibition-item]')) {
      appState.state.exhibitions = readExhibitionsFromDom();
    }

    if (document.querySelector('[data-request-item]')) {
      appState.state.requestCases = readRequestsFromDom();
    }

    syncManualChangeNote();
  } catch (error) {
    console.warn('編集中データの同期を一部スキップしました', error);
  }
}

function collectSelectedDriveFolderIds() {
  const ids = [];

  const recruit = appState.state.recruitCalendar || {};
  if (recruit.folderId) ids.push(recruit.folderId);

  (appState.state.activityArticles || []).forEach((item) => {
    if (item.photoFolderId) ids.push(item.photoFolderId);
  });

  (appState.state.exhibitions || []).forEach((item) => {
    if (item.driveFolderId) ids.push(item.driveFolderId);
  });

  (appState.state.requestCases || []).forEach((item) => {
    if (item.photoFolderId) ids.push(item.photoFolderId);
  });

  return Array.from(new Set(ids.filter(Boolean)));
}

function nonDmImageFiles(files) {
  return (files || []).filter((file) => !/^dm(?:[0-9０-９]+)?\./i.test(file.name || ''));
}

function mergeWorksWithDriveImagesForRefresh(existingWorks, driveImages) {
  const previousByFileName = {};
  (existingWorks || []).forEach((work) => {
    if (work.imageFileName) {
      previousByFileName[work.imageFileName] = work;
    }
  });

  return nonDmImageFiles(driveImages)
    .slice(0, EXHIBITION_WORK_LIMIT)
    .map((file) => {
      const previous = previousByFileName[file.name] || {};
      return {
        imageFileName: file.name,
        thumbnailUrl: file.thumbnailUrl,
        workTitle: previous.workTitle || '',
        artistName: previous.artistName || ''
      };
    });
}

function detectRemovedWorkFileNames(existingWorks, driveImages) {
  const currentNames = new Set(nonDmImageFiles(driveImages).map((file) => file.name));

  return (existingWorks || [])
    .map((work) => work.imageFileName)
    .filter((name) => name && !currentNames.has(name));
}

async function onRefreshDriveChanges() {
  if (driveRefreshInFlight) return;

  driveRefreshInFlight = true;
  const previousImageCache = Object.assign({}, appState.imageCache);

  try {
    syncCurrentEditorsToState();

    setStatus('Driveの変更を反映しています…');

    const options = await serverCall('listDriveFolders', appState.sessionToken);
    appState.options = options || appState.options || {};

    const selectedFolderIds = collectSelectedDriveFolderIds();

    await Promise.all(selectedFolderIds.map((folderId) => getFolderImagesFresh(folderId)));

    const removedMessages = [];

    (appState.state.exhibitions || []).forEach((exhibition) => {
      if (!exhibition.driveFolderId) return;

      const driveImages = appState.imageCache[exhibition.driveFolderId] || [];
      const removed = detectRemovedWorkFileNames(exhibition.works || [], driveImages);

      if (removed.length) {
        removedMessages.push(
          `${exhibition.title || '展示会'}: ${removed.join(', ')}`
        );
      }
    });

    if (removedMessages.length) {
      const ok = confirm(
        'Driveから見つからなくなった作品画像があります。\n' +
        '該当する作品情報は表示対象から外れます。\n\n' +
        removedMessages.join('\n') +
        '\n\nDriveの変更を反映しますか？'
      );

      if (!ok) {
        appState.imageCache = previousImageCache;
        setStatus('Driveの変更反映をキャンセルしました。');
        return;
      }
    }

    appState.state.exhibitions = (appState.state.exhibitions || []).map((exhibition) => {
      if (!exhibition.driveFolderId) return exhibition;

      const driveImages = appState.imageCache[exhibition.driveFolderId] || [];

      return Object.assign({}, exhibition, {
        works: mergeWorksWithDriveImagesForRefresh(exhibition.works || [], driveImages)
      });
    });

    renderAll();

    setStatus('Driveの変更を反映しました。', 'success');
  } catch (error) {
    appState.imageCache = previousImageCache;
    setStatus(error.message, 'error');
  } finally {
    driveRefreshInFlight = false;
  }
}


function sortExhibitions(items) {
  const weight = { upcoming: 0, archive: 1 };
  return (items || []).slice().sort((a, b) => {
    const bucketA = Object.prototype.hasOwnProperty.call(weight, a.displayBucket) ? weight[a.displayBucket] : 99;
    const bucketB = Object.prototype.hasOwnProperty.call(weight, b.displayBucket) ? weight[b.displayBucket] : 99;
    if (bucketA !== bucketB) return bucketA - bucketB;
    const hasDateA = !!String(a.startDate || '').trim();
    const hasDateB = !!String(b.startDate || '').trim();
    if (!hasDateA && !hasDateB) return String(b.draftCreatedAt || '').localeCompare(String(a.draftCreatedAt || ''));
    if (!hasDateA) return -1;
    if (!hasDateB) return 1;
    if (a.displayBucket === 'upcoming') return String(a.startDate || '').localeCompare(String(b.startDate || ''));
    return String(b.startDate || '').localeCompare(String(a.startDate || ''));
  });
}

function visibleChipHtml(published) {
  return `<span class="visibility-chip${published ? '' : ' is-hidden'}">${published ? '公開中' : '非公開'}</span>`;
}

function activityCategoryLabel(category) {
  const labels = { record: '活動記録', event: 'イベント告知', other: 'その他' };
  return labels[String(category || 'record')] || 'その他';
}

const GENERAL_IMAGE_LIMIT = 10;
const EXHIBITION_WORK_LIMIT = 200;

function limitFolderImages(images, limit) {
  const list = Array.isArray(images) ? images : [];
  return { total: list.length, items: list.slice(0, limit), hidden: Math.max(0, list.length - limit) };
}

function folderImageWarning(total, limit, label) {
  if (!(total > limit)) return '';
  return `<div class="warning-note">${escapeHtml(label)}は${limit}枚まで表示します（${total}枚中${limit}枚を使用）。</div>`;
}

function looksLegacySummarySegment(segment) {
  return segment === '新歓イベントカレンダーを更新'
    || /^(活動記事|活動記録・告知|ご依頼事例|取り組み事例|取り組み)「.+?」(?:を追加|を更新|の情報を公開)?$/.test(segment)
    || /^展示会「.+?」(?:を追加|を更新|の情報を公開)?$/.test(segment);
}

function splitSummarySegments(summary) {
  const normalized = String(summary || '').replace(/\r\n?/g, '\n').trim();
  if (!normalized) return [];
  if (normalized.indexOf('\n') !== -1) return normalized.split(/\n+/).map((part) => part.trim()).filter(Boolean);
  const legacyParts = normalized.split(/\s\/\s/).map((part) => part.trim()).filter(Boolean);
  if (legacyParts.length > 1 && legacyParts.every(looksLegacySummarySegment)) return legacyParts;
  return [normalized];
}

function publicSegmentKey(segment) {
  if (segment === '新歓イベントカレンダーを更新') return { kind: 'recruit', title: '' };
  let m = segment.match(/^(活動記事|活動記録・告知)「(.+?)」(?:を追加|を更新|の情報を公開)?$/);
  if (m) return { kind: 'activity', title: m[2] };
  m = segment.match(/^(ご依頼事例|取り組み事例|取り組み)「(.+?)」(?:を追加|を更新|の情報を公開)?$/);
  if (m) return { kind: 'request', title: m[2] };
  m = segment.match(/^展示会「(.+?)」(?:を追加|を更新|の情報を公開)?$/);
  if (m) return { kind: 'exhibition', title: m[1] };
  return { kind: '', title: '' };
}

function canonicalPublicSummary(kind, title) {
  if (kind === 'recruit') return '新歓イベントカレンダーを更新';
  if (kind === 'activity' && title) return `活動記録・告知「${title}」`;
  if (kind === 'request' && title) return `取り組み「${title}」`;
  if (kind === 'exhibition' && title) return `展示会「${title}」の情報を公開`;
  return title || '';
}

function buildVisibleTitleSets(state) {
  const out = { activity: new Set(), request: new Set(), exhibition: new Set() };
  (state.activityArticles || []).filter((item) => item.published !== false).forEach((item) => out.activity.add(String(item.title || '')));
  (state.requestCases || []).filter((item) => item.published !== false).forEach((item) => out.request.add(String(item.title || '')));
  (state.exhibitions || []).filter((item) => item.published !== false).forEach((item) => out.exhibition.add(String(item.title || '')));
  return out;
}

function summarizePendingPublicChanges(beforeState, afterState, manualNote) {
  const messages = [];
  const pushUnique = (value) => {
    if (value && messages.indexOf(value) === -1) messages.push(value);
  };
  const beforeRecruit = beforeState && beforeState.recruitCalendar ? beforeState.recruitCalendar.folderId : '';
  const afterRecruit = afterState.recruitCalendar ? afterState.recruitCalendar.folderId : '';
  if (beforeRecruit !== afterRecruit && afterRecruit) pushUnique('新歓イベントカレンダーを更新');

  const beforeActivities = {}; (beforeState.activityArticles || []).forEach((item) => beforeActivities[item.articleId] = item);
  (afterState.activityArticles || []).forEach((item) => {
    const before = beforeActivities[item.articleId];
    if ((!before || before.published === false) && item.published !== false) pushUnique(`活動記録・告知「${item.title}」`);
  });

  const beforeRequests = {}; (beforeState.requestCases || []).forEach((item) => beforeRequests[item.caseId] = item);
  (afterState.requestCases || []).forEach((item) => {
    const before = beforeRequests[item.caseId];
    if ((!before || before.published === false) && item.published !== false) pushUnique(`取り組み「${item.title}」`);
  });

  const beforeExhibitions = {}; (beforeState.exhibitions || []).forEach((item) => beforeExhibitions[item.exhibitionId] = item);
  (afterState.exhibitions || []).forEach((item) => {
    const before = beforeExhibitions[item.exhibitionId];
    if ((!before || before.published === false) && item.published !== false) pushUnique(`展示会「${item.title}」の情報を公開`);
  });

  if (manualNote) pushUnique(manualNote);
  return messages.join('\n');
}

function deriveSiteHistoryEntries(baseLog, state, pendingSummary) {
  const visible = buildVisibleTitleSets(state);
  const entries = [];
  if (pendingSummary) entries.push({ timestamp: new Date().toISOString(), summary: pendingSummary });
  (baseLog || []).forEach((item) => entries.push(item));
  const groups = new Map();
  entries.forEach((entry) => {
    const dateKey = formatDate(entry.timestamp);
    if (!groups.has(dateKey)) groups.set(dateKey, []);
    splitSummarySegments(entry.summary).forEach((segment) => {
      const { kind, title } = publicSegmentKey(segment);
      let keep = false;
      let normalized = segment;
      if (kind === 'recruit') {
        keep = true;
        normalized = canonicalPublicSummary('recruit');
      } else if (kind && title) {
        keep = visible[kind] && visible[kind].has(title);
        normalized = canonicalPublicSummary(kind, title);
      } else if (!kind) {
        keep = !!segment;
      }
      if (keep && groups.get(dateKey).indexOf(normalized) === -1) groups.get(dateKey).push(normalized);
    });
  });
  return Array.from(groups.entries()).filter(([, items]) => items.length).map(([date, items]) => ({ date, items }));
}

function buildSiteHistoryComparison(currentEntries, nextEntries) {
  const currentMap = new Map();
  const nextMap = new Map();
  const grouped = new Map();

  function ensureDate(date) {
    if (!grouped.has(date)) grouped.set(date, []);
    return grouped.get(date);
  }

  currentEntries.forEach((entry) => {
    entry.items.forEach((summary, index) => {
      currentMap.set(`${entry.date}::${summary}`, { date: entry.date, summary, index });
    });
  });

  nextEntries.forEach((entry) => {
    entry.items.forEach((summary, index) => {
      const key = `${entry.date}::${summary}`;
      nextMap.set(key, { date: entry.date, summary, index });
      ensureDate(entry.date).push({ summary, status: currentMap.has(key) ? 'unchanged' : 'added', order: index });
    });
  });

  currentEntries.forEach((entry) => {
    entry.items.forEach((summary, index) => {
      const key = `${entry.date}::${summary}`;
      if (nextMap.has(key)) return;
      ensureDate(entry.date).push({ summary, status: 'removed', order: 1000 + index });
    });
  });

  return Array.from(grouped.entries())
    .sort((a, b) => String(b[0]).localeCompare(String(a[0])))
    .map(([date, items]) => ({
      date,
      items: items.sort((a, b) => a.order - b.order).map(({ summary, status }) => ({ summary, status }))
    }))
    .filter((entry) => entry.items.length);
}

function buildThumbCarouselHtml(images, poster=false) {
  const source = (images || []).slice(0, 10);
  if (!source.length) return '';
  if (poster) {
    const first = source[0];
    const firstUrl = escapeHtml(first.thumbnailUrl || first.image || first);
    const dots = source.length > 1 ? `<div class="preview-poster-dots">${source.slice(0, 2).map((_, index) => `<span class="${index === 0 ? 'is-active' : ''}"></span>`).join('')}</div>` : '';
    return `
      <div class="preview-carousel poster is-poster-carousel">
        <div class="preview-thumb"><img src="${firstUrl}" alt=""></div>
        ${dots}
      </div>`;
  }
  const visible = source.slice(0, 4);
  const extra = Math.max(0, source.length - visible.length);
  const countClass = `count-${Math.min(source.length, 4)}`;
  return `<div class="preview-carousel ${countClass}">${visible.map((img, index) => {
    const url = escapeHtml(img.thumbnailUrl || img.image || img);
    const more = (extra && index === visible.length - 1) ? `<span class="preview-more">+${extra}</span>` : '';
    return `<div class="preview-thumb"><img src="${url}" alt="">${more}</div>`;
  }).join('')}</div>`;
}


function buildRecruitPreviewHtml(images) {
  const source = (images || []).slice(0, 10);
  if (!source.length) return '';
  const first = source[0];
  const url = escapeHtml(first.thumbnailUrl || first.image || first);
  const dots = source.length > 1 ? `<div class="preview-recruit-dots">${source.map((_, index) => `<span class="${index === 0 ? 'is-active' : ''}"></span>`).join('')}</div>` : '';
  return `
    <div class="preview-recruit-carousel">
      <img src="${url}" alt="新歓イベントカレンダー">
      ${dots}
    </div>
  `;
}

function buildMetaListHtml(item) {
  const venueValue = item.venueName
    ? `${escapeHtml(item.venueName)}${item.venueAddress ? `<span class="address">${escapeHtml(item.venueAddress)}</span>` : ''}`
    : '';
  const dateTimeValue = `${item.dateLine ? `<span>${escapeHtml(item.dateLine)}</span>` : ''}${item.timeLine ? `<span class="address">${escapeHtml(item.timeLine)}</span>` : ''}`;
  return `
    <div class="preview-meta-list">
      <div class="preview-meta-row"><div class="preview-meta-label">会期</div><div class="preview-meta-value">${dateTimeValue}</div></div>
      <div class="preview-meta-row"><div class="preview-meta-label">会場</div><div class="preview-meta-value">${venueValue}</div></div>
    </div>
  `;
}

const FILE_WARN_SIZE = 5 * 1024 * 1024;
const FILE_STRONG_WARN_SIZE = 10 * 1024 * 1024;
const FILE_MAX_SIZE = 20 * 1024 * 1024;
const FILE_TOTAL_WARN_SIZE = 50 * 1024 * 1024;

function escapeJs(value) {
  return String(value == null ? '' : value)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\r?\n/g, '\\n');
}

function ensureMediaDialog() {
  let dialog = document.getElementById('mediaDialog');
  if (dialog) return dialog;
  dialog = document.createElement('div');
  dialog.id = 'mediaDialog';
  dialog.className = 'media-modal hidden';
  dialog.innerHTML = `
    <div class="media-modal-backdrop" onclick="closeMediaDialog()"></div>
    <div class="media-modal-panel" role="dialog" aria-modal="true" aria-labelledby="mediaDialogTitle">
      <div class="media-modal-head">
        <div>
          <h2 id="mediaDialogTitle">画像の設定</h2>
          <div id="mediaDialogSubtitle" class="small-note"></div>
        </div>
        <button class="icon-action-button" type="button" onclick="closeMediaDialog()" aria-label="閉じる"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="mediaDialogBody" class="media-modal-body"></div>
    </div>
  `;
  document.body.appendChild(dialog);
  return dialog;
}

function getContentRef(kind, index) {
  if (kind === 'recruit') {
    const item = appState.state.recruitCalendar || { folderId: '', label: '' };
    appState.state.recruitCalendar = item;
    return {
      item,
      folderKey: 'folderId',
      title: item.label || '新歓イベントカレンダー',
      dialogTitle: '画像の設定',
      subtitle: '新歓イベントカレンダー'
    };
  }
  if (kind === 'activity') {
    const item = (appState.state.activityArticles || [])[index];
    return {
      item,
      folderKey: 'photoFolderId',
      title: item && item.title ? item.title : '活動記録・告知',
      dialogTitle: '画像の設定',
      subtitle: '活動記録・告知'
    };
  }
  if (kind === 'request') {
    const item = (appState.state.requestCases || [])[index];
    return {
      item,
      folderKey: 'photoFolderId',
      title: item && item.title ? item.title : '取り組み事例',
      dialogTitle: '画像の設定',
      subtitle: '取り組み事例'
    };
  }
  if (kind === 'exhibition') {
    const sorted = sortExhibitions(appState.state.exhibitions || []);
    const item = sorted[index];
    return {
      item,
      folderKey: 'driveFolderId',
      title: item && item.title ? item.title : '展示会',
      dialogTitle: '画像・目録の設定',
      subtitle: '展示会'
    };
  }
  return { item: null, folderKey: '', title: '', dialogTitle: '画像の設定', subtitle: '' };
}

function currentMediaContext() {
  const active = appState.activeMedia || {};
  const ref = getContentRef(active.kind, active.index);
  return Object.assign({}, active, ref, {

  });

function isDmFile(file) {
  return /^dm(?:[0-9０-９]+)?\./i.test(file.name || '');
}

function mediaRoleOptions(context) {

        <option value="catalog">PDF目録</option>

  `;
}

function renderMediaDialog(files) {
  const context = currentMediaContext();
  const imageFiles = (files || []).filter((file) => file.kind === 'image');
  const pdfFiles = (files || []).filter((file) => file.kind === 'pdf');
  const dmFiles = imageFiles.filter(isDmFile);
  const workFiles = imageFiles.filter((file) => !isDmFile(file));
  const genericImages = context.kind === 'exhibition' ? workFiles : imageFiles;
  const accept = context.kind === 'exhibition' ? 'image/*,application/pdf' : 'image/*';
  const folderUrl = context.folderId ? `https://drive.google.com/drive/folders/${encodeURIComponent(context.folderId)}` : '';

  document.getElementById('mediaDialogBody').innerHTML = `
    <div class="media-upload-box">
      <div class="media-upload-row">

        <div class="field media-file-field">
          <label>ファイルを追加</label>
          <input id="mediaUploadInput" type="file" multiple accept="${accept}">
        </div>
        <button class="button success" type="button" onclick="onMediaUpload()">アップロード</button>
      </div>
      <div class="small-note">大きいファイルはアップロード前に警告します。20MBを超えるファイルは分割・圧縮してください。</div>
      ${folderUrl ? `<a class="root-link-row media-folder-link" href="${escapeHtml(folderUrl)}" target="_blank" rel="noopener noreferrer"><span>Driveで開く</span><i class="fa-solid fa-up-right-from-square"></i></a>` : ''}
    </div>
    ${context.kind === 'exhibition' ? `
      <div class="media-section">
        <h3>DM画像</h3>
        ${renderMediaFileList(dmFiles, 'DM画像は未設定です。')}
      </div>
      <div class="media-section">
        <h3>作品画像</h3>
        ${renderMediaFileList(workFiles, '作品画像は未設定です。')}
      </div>
      <div class="media-section">
        <h3>PDF目録</h3>
        ${renderMediaFileList(pdfFiles, 'PDF目録は未設定です。')}
      </div>
    ` : `
      <div class="media-section">
        <h3>画像</h3>
        ${renderMediaFileList(genericImages, '画像は未設定です。')}

function renderMediaFileList(files, emptyText) {
  if (!files.length) return `<div class="preview-empty">${escapeHtml(emptyText)}</div>`;
  return `<div class="media-file-grid">${files.map((file) => renderMediaFileCard(file)).join('')}</div>`;
}

function renderMediaFileCard(file) {
  const thumb = file.kind === 'image'
    ? `<img src="${escapeHtml(file.thumbnailUrl)}" alt="">`
    : '<div class="pdf-thumb"><i class="fa-regular fa-file-pdf"></i><span>PDF</span></div>';
  return `
    <article class="media-file-card">
      <div class="media-file-thumb">${thumb}</div>
      <div class="media-file-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</div>
      <div class="small-note">${formatBytes(file.size || 0)}</div>
      <div class="media-file-actions">
        <button class="button subtle" type="button" onclick="onMediaRename('${escapeJs(file.id)}', '${escapeJs(file.name)}')">名前変更</button>
        <button class="button danger" type="button" onclick="onMediaDelete('${escapeJs(file.id)}', '${escapeJs(file.name)}')">削除</button>
      </div>
    </article>
  `;
}

function validateMediaSelection(files, role, context) {
  if (!files.length) throw new Error('アップロードするファイルを選択してください。');
  let total = 0;
  const warnings = [];
  Array.from(files).forEach((file) => {
    total += file.size || 0;
    if (file.size > FILE_MAX_SIZE) {
      throw new Error(`${file.name} は20MBを超えています。圧縮または分割してください。`);
    }
    if (context.kind !== 'exhibition' && !file.type.startsWith('image/')) {
      throw new Error(`${file.name} は画像ファイルではありません。`);
    }
    if (context.kind === 'exhibition' && role === 'catalog' && file.type !== 'application/pdf') {
      throw new Error(`${file.name} はPDFファイルではありません。`);
    }
    if (context.kind === 'exhibition' && role !== 'catalog' && !file.type.startsWith('image/')) {
      throw new Error(`${file.name} は画像ファイルではありません。`);
    }
    if (file.size > FILE_STRONG_WARN_SIZE) warnings.push(`${file.name}: ${formatBytes(file.size)}（大きめ）`);
    else if (file.size > FILE_WARN_SIZE) warnings.push(`${file.name}: ${formatBytes(file.size)}`);
  });
  if (total > FILE_TOTAL_WARN_SIZE) warnings.push(`合計: ${formatBytes(total)}`);
  if (warnings.length) {
    return confirm('大きいファイルが含まれています。\nアップロードに時間がかかる場合があります。\n\n' + warnings.join('\n') + '\n\n続行しますか？');
  }
  return true;
}

function readFilePayload(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const value = String(reader.result || '');
      resolve({
        name: file.name,
        mimeType: file.type || 'application/octet-stream',
        data: value.indexOf(',') >= 0 ? value.split(',').pop() : value
      });
    };
    reader.onerror = () => reject(reader.error || new Error('ファイルの読み込みに失敗しました。'));
    reader.readAsDataURL(file);
  });
}

async function onMediaUpload() {
  const context = currentMediaContext();
  const input = document.getElementById('mediaUploadInput');
  const roleField = document.getElementById('mediaUploadRole');
  const role = roleField ? roleField.value : 'image';
  const selected = input && input.files ? Array.from(input.files) : [];

  try {
    if (!validateMediaSelection(selected, role, context)) return;
    document.getElementById('mediaDialogBody').classList.add('is-loading');
    setStatus('ファイルをアップロードしています…');
    const files = await Promise.all(selected.map(readFilePayload));
    const result = await serverCall('uploadManagedFiles', appState.sessionToken, {
      kind: context.kind,
      role,
      folderId: context.folderId,
      title: context.title,
      draft: true,
      files
    });
    applyMediaResult(result);
    renderMediaDialog(result.files || []);
    setStatus('アップロードしました。', 'success');
  } catch (error) {
    setStatus(error.message, 'error');
  } finally {
    const body = document.getElementById('mediaDialogBody');
    if (body) body.classList.remove('is-loading');
  }
}

async function onMediaRename(fileId, currentName) {
  const context = currentMediaContext();
  const requested = prompt('新しいファイル名を入力してください。', currentName);
  if (requested == null) return;
  try {
    setStatus('ファイル名を変更しています…');
    const result = await serverCall('renameManagedFile', appState.sessionToken, {
      folderId: context.folderId,
      fileId,
      name: requested
    });
    applyMediaResult(result, { type: 'rename', fileId, oldName: currentName });
    renderMediaDialog(result.files || []);
    setStatus('ファイル名を変更しました。', 'success');
  } catch (error) {
    setStatus(error.message, 'error');
  }
}

async function onMediaDelete(fileId, name) {
  const context = currentMediaContext();
  if (!confirm(`${name} を削除しますか？`)) return;
  try {
    setStatus('ファイルを削除しています…');
    const result = await serverCall('trashManagedFile', appState.sessionToken, {
      folderId: context.folderId,
      fileId
    });
    applyMediaResult(result);
    renderMediaDialog(result.files || []);
    setStatus(result.folderTrashed ? '最後のファイルを削除したため、空のフォルダも削除しました。' : 'ファイルを削除しました。', 'success');
  } catch (error) {
    setStatus(error.message, 'error');
  }
}

function applyMediaResult(result, mutation) {
  const context = currentMediaContext();
  if (!context.item || !context.folderKey) return;
  const folderId = result && result.folderId ? result.folderId : '';
  const oldFolderId = context.item[context.folderKey] || '';
  context.item[context.folderKey] = folderId;
  if (oldFolderId && oldFolderId !== folderId) invalidateFolderCache(oldFolderId);
  if (folderId) {
    appState.mediaCache[folderId] = result.files || [];
    appState.imageCache[folderId] = (result.files || []).filter((file) => file.kind === 'image');
  }

  if (context.kind === 'exhibition') {
    const files = result.files || [];
    if (mutation && mutation.type === 'rename') {
      const renamed = files.find((file) => file.id === mutation.fileId);
      if (renamed) {
        (context.item.works || []).forEach((work) => {
          if (work.imageFileName === mutation.oldName) work.imageFileName = renamed.name;
        });
      }
    }
    context.item.works = mergeWorksWithDriveImagesForRefresh(context.item.works || [], files.filter((file) => file.kind === 'image'));
  }

  markDirty();
  rerenderAfterMediaChange(context.kind);
}

function rerenderAfterMediaChange(kind) {
  appState.suppressDirty = true;
  try {
    if (kind === 'recruit') renderRecruitEditor();
    if (kind === 'activity') renderActivitiesEditor();
    if (kind === 'exhibition') renderExhibitionsEditor();
    if (kind === 'request') renderRequestsEditor();
    renderDashboard();
  } finally {
    appState.suppressDirty = false;
  }
}

function formatBytes(bytes) {
  const value = Number(bytes || 0);
  if (!value) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let size = value;
  let unit = 0;
  while (size >= 1024 && unit < units.length - 1) {
    size /= 1024;
    unit += 1;
  }
  return `${size.toFixed(unit >= 3 ? 1 : 0)} ${units[unit]}`;
}

function renderStorageCard() {
  const maintenance = appState.maintenance || {};

  }
  const pct = storage.limit ? Math.round((storage.usageRatio || 0) * 1000) / 10 : 0;
  const levelText = {
    ok: '余裕があります',
    notice: '注意',
    warning: '警告',

  return `

function renderExhibitionWorksEditor(works, folderId, totalCount = works.length) {
  if (!works.length) {
    return '<div class="small-note">作品画像を追加すると、作品名と作者名を入力できます。</div>';
  }
  const imageMap = {};
  const cached = appState.imageCache[folderId] || [];
  cached.forEach((file) => { imageMap[file.name] = file.thumbnailUrl; });
  const itemsHtml = works.map((work, idx) => {
    const thumb = imageMap[work.imageFileName] || work.thumbnailUrl || '';
    const fileLabel = escapeHtml(work.imageFileName || `作品 ${idx + 1}`);
    return `
      <div class="work-editor-card" data-exhibition-work>
        <div class="work-editor-media">
          <div class="work-file-name" title="${fileLabel}">${fileLabel}</div>
          <div class="work-editor-thumb">${thumb ? `<img src="${escapeHtml(thumb)}" alt="">` : '<div class="preview-empty">画像なし</div>'}</div>
        </div>
        <div class="work-editor-fields">
          <input data-field="imageFileName" type="hidden" value="${escapeHtml(work.imageFileName || '')}">
          <div class="field"><label>作品タイトル</label><input data-field="workTitle" value="${escapeHtml(work.workTitle || '')}" oninput="refreshExhibitionPreview()"></div>
          <div class="field"><label>作者名</label><input data-field="artistName" value="${escapeHtml(work.artistName || '')}" oninput="refreshExhibitionPreview()"></div>
        </div>
      </div>`;
  }).join('');
  const warning = totalCount > EXHIBITION_WORK_LIMIT ? `<div class="warning-note">作品画像は${EXHIBITION_WORK_LIMIT}枚まで扱います（${totalCount}枚中${EXHIBITION_WORK_LIMIT}枚を使用）。</div>` : '';
  return `<details class="work-editor-disclosure"><summary>作品情報を編集する (${works.length})</summary>${warning}<div class="work-editor-list">${itemsHtml}</div></details>`;
}


async function loadExhibitionFolderImages(index) {
  const item = document.querySelector(`[data-exhibition-item][data-index="${index}"]`);
  const folderId = item.querySelector('[data-field="driveFolderId"]').value;
  const wrap = item.querySelector(`#exhibitionWorks_${index}`);
  if (!folderId) {
    wrap.innerHTML = renderExhibitionWorksEditor([], folderId, 0);
    refreshExhibitionPreview();
    return;
  }
  const files = await getFolderImagesFresh(folderId);
  const currentWorks = Array.from(item.querySelectorAll('[data-exhibition-work]')).map((work) => ({
    imageFileName: work.querySelector('[data-field="imageFileName"]').value,
    workTitle: work.querySelector('[data-field="workTitle"]').value.trim(),
    artistName: work.querySelector('[data-field="artistName"]').value.trim()
  }));
  const workMap = {};
  currentWorks.forEach((work) => { workMap[work.imageFileName] = work; });
  const filtered = files.filter((file) => !/^dm(?:[0-9０-９]+)?\./i.test(file.name || ''));
  const limited = filtered.slice(0, EXHIBITION_WORK_LIMIT);
  const works = limited.map((file) => ({
    imageFileName: file.name,
    thumbnailUrl: file.thumbnailUrl,
    workTitle: workMap[file.name] ? workMap[file.name].workTitle : '',
    artistName: workMap[file.name] ? workMap[file.name].artistName : ''
  }));
  wrap.innerHTML = renderExhibitionWorksEditor(works, folderId, filtered.length);
  refreshExhibitionPreview();
}



async function renderExhibitionPreview(items) {
  const visible = sortExhibitions((items || []).filter((item) => item.published !== false));
  const upcoming = visible.filter((item) => item.displayBucket === 'upcoming');
  const archive = visible.filter((item) => item.displayBucket === 'archive');
  const recent = archive.length ? archive[0] : null;
  const archiveRest = archive.slice(1);
  const sections = [];

  if (upcoming.length) {
    const upcomingCards = await Promise.all(upcoming.map(async (item, idx) => {
      const images = await getFolderImagesCached(item.driveFolderId);
      const dm = images.filter((file) => /^dm(?:[0-9０-９]+)?\./i.test(file.name || ''));
      return `
        <article class="preview-site-card">
          <span class="preview-site-kicker">${idx === 0 ? 'NEXT EXHIBITION' : 'UPCOMING'}</span>
          <h4>${escapeHtml(item.title || '展示会名')}</h4>
          <div class="preview-exhibition-layout">
            <div class="preview-exhibition-copy">
              <p class="preview-exhibition-overview">${escapeHtml(item.theme || '')}</p>
              <div class="preview-exhibition-meta">${buildMetaListHtml(item)}</div>
            </div>
            <div class="preview-dm-slot">${buildThumbCarouselHtml(dm, true)}</div>
          </div>
        </article>
      `;
    }));
    sections.push(upcomingCards.join(''));
  }

  if (recent) {
    const images = await getFolderImagesCached(recent.driveFolderId);
    const dm = images.filter((file) => /^dm(?:[0-9０-９]+)?\./i.test(file.name || ''));
    const workImages = (recent.works || []).map((work) => {
      const found = images.find((file) => file.name === work.imageFileName);
      return found ? { thumbnailUrl: found.thumbnailUrl, title: work.workTitle, artist: work.artistName } : null;
    }).filter(Boolean);
    sections.push(`
      <article class="preview-site-card">
        <span class="preview-site-kicker">RECENT EXHIBITION</span>
        <h4>${escapeHtml(recent.title || '展示会名')}</h4>
        <div class="preview-exhibition-layout">
          <div class="preview-exhibition-copy">
            <p class="preview-exhibition-overview">${escapeHtml(recent.theme || '')}</p>
            <div class="preview-exhibition-meta">${buildMetaListHtml(recent)}</div>
          </div>
          <div class="preview-dm-slot">${buildThumbCarouselHtml(dm, true)}</div>
        </div>
        ${workImages.length ? `<div class="preview-work-grid">${workImages.map((work) => `
          <div class="preview-work-card">
            <img src="${escapeHtml(work.thumbnailUrl)}" alt="">
            <div style="font-weight:700">${escapeHtml(work.title || '')}</div>
            <div class="small-note">${escapeHtml(work.artist || '')}</div>
          </div>`).join('')}</div>` : ''}
      </article>
    `);
  }

  const archiveCards = await Promise.all(archiveRest.map(async (item) => {
    const archiveImages = await getFolderImagesCached(item.driveFolderId);
    const archiveDm = archiveImages.filter((file) => /^dm(?:[0-9０-９]+)?\./i.test(file.name || ''));
    return `
      <div class="preview-archive-item">
        <div class="preview-archive-body">
          <div style="font-weight:700; margin-bottom:6px;">${escapeHtml(item.title || '')}</div>
          <div class="preview-dm-slot">${buildThumbCarouselHtml(archiveDm, true)}</div>
          <div class="small-note" style="margin-bottom:8px;">${escapeHtml(item.theme || '')}</div>
          ${buildMetaListHtml(item)}
          ${item.driveFolderId ? `<div class="preview-drive-wrap"><a class="button subtle" href="https://drive.google.com/drive/folders/${escapeHtml(item.driveFolderId || '')}" target="_blank" rel="noopener noreferrer">Google Driveで見る</a></div>` : ''}
        </div>
      </div>`;
  }));

  sections.push(`
    <article class="preview-site-card">
      <span class="preview-site-kicker">ARCHIVE</span>
      <h4>展示会アーカイブ</h4>
      ${archiveCards.length ? `<div class="preview-archive-list">${archiveCards.join('')}</div>` : '<div class="preview-empty">公開中のアーカイブはありません。</div>'}
    </article>
  `);

  return `<div class="preview-site">${sections.join('')}</div>`;
}

        <h4>${escapeHtml(item.title || 'タイトル未入力')}</h4>
        <p>${escapeHtml(item.body || '本文未入力')}</p>
        ${buildThumbCarouselHtml(imageResult.items)}
        ${folderImageWarning(imageResult.total, GENERAL_IMAGE_LIMIT, '画像')}
      </article>
    `;
  }));
  return `<div class="preview-site">${cards.join('')}</div>`;
}

function addRequestCase() {
  appState.state.requestCases.unshift({
    caseId: '',
    title: '',
    body: '',
    photoFolderId: '',
    published: true
  });
  renderRequestsEditor();
}

function moveRequestCase(index, delta) {
  const target = index + delta;
  if (target < 0 || target >= appState.state.requestCases.length) return;
  const items = appState.state.requestCases;
  const tmp = items[index];
  items[index] = items[target];
  items[target] = tmp;
  renderRequestsEditor();
}

function toggleRequestPublished(index) {
  const item = appState.state.requestCases[index];
  if (!item) return;
  item.published = item.published === false;
  renderRequestsEditor();
}

function removeRequestCase(index) {
  if (!confirm('この事例を削除しますか？\n公開済みのコンテンツは削除ではなく非公開推奨です。')) return;
  appState.state.requestCases.splice(index, 1);
  renderRequestsEditor();
}

async function refreshRequestPreview() {
  const html = await renderRequestPreview(readRequestsFromDom());
  document.getElementById('requestPreview').innerHTML = html;
}

let logsPreviewTimer = 0;

function scheduleLogsPreviewRefresh() {
  if (logsPreviewTimer) clearTimeout(logsPreviewTimer);
  logsPreviewTimer = setTimeout(() => {
    logsPreviewTimer = 0;
    renderLogsPreviewContent();
  }, 120);
}

function buildLogsPreviewCardHtml() {
  const currentPayload = buildPayloadFromDom();
  const pendingSummary = summarizePendingPublicChanges(appState.loadedState || appState.state || {}, currentPayload, currentPayload.manualChangeNote || '');
  const currentSiteHistory = deriveSiteHistoryEntries(appState.state.changeLog || [], appState.loadedState || appState.state || {}, '');
  const nextSiteHistory = deriveSiteHistoryEntries(appState.state.changeLog || [], currentPayload, pendingSummary);
  const compared = buildSiteHistoryComparison(currentSiteHistory, nextSiteHistory);
  return `
      <div class="card">
        <h2>サイトの更新履歴プレビュー</h2>
        <div class="small-note" style="margin-bottom:12px;">緑は今回の公開で新しく表示される項目、赤は今回の公開でサイト上から非表示になる項目です。</div>
        <div class="preview-sim-legend">
          <span class="preview-sim-chip is-added">追加・再表示</span>
          <span class="preview-sim-chip is-removed">非表示</span>
          <span class="preview-sim-chip is-unchanged">継続表示</span>
        </div>
        <div class="preview-sim-list">
          ${compared.length ? compared.map((entry) => `
            <div class="preview-sim-item">
              <div class="preview-sim-date">${escapeHtml(entry.date)}</div>
              <ul class="preview-sim-bullets">${entry.items.map((item) => `<li class="is-${escapeHtml(item.status)}"><span class="preview-sim-badge is-${escapeHtml(item.status)}">${item.status === 'added' ? '追加' : (item.status === 'removed' ? '非表示' : '継続')}</span><span class="preview-sim-text">${escapeHtml(item.summary)}</span></li>`).join('')}</ul>
            </div>`).join('') : '<div class="small-note">まだ履歴がありません。</div>'}
        </div>
      </div>
  `;
}

function renderLogsPreviewContent() {
  const wrap = document.getElementById('logsPreviewContent');
  if (!wrap) return;
  wrap.innerHTML = buildLogsPreviewCardHtml();
}

function renderLogs() {
  const panel = document.getElementById('panel-logs');
  panel.innerHTML = `
    <div class="stack">
      <div class="card">
        <h2>更新履歴メモ</h2>
        <div class="small-note">必要なときだけ、自由記述の履歴を追加できます。サイト側の履歴には現在の公開状態に応じて表示されます。</div>
        <div class="field full" style="margin-top:14px;">
          <label>フリーテキスト履歴（改行ごとに1項目）</label>
          <textarea id="manualChangeNote" placeholder="例: 会場のご案内を更新しました。\n次回展示の詳細を追記しました。" oninput="syncManualChangeNote(); scheduleLogsPreviewRefresh();">${escapeHtml(appState.state.manualChangeNote || '')}</textarea>
        </div>
      </div>
      <div id="logsPreviewContent"></div>
    </div>
  `;
  renderLogsPreviewContent();
}

function readRecruitFromDom() {
  return {
    folderId: document.getElementById('recruitCalendarFolder') ? document.getElementById('recruitCalendarFolder').value : '',
    label: document.getElementById('recruitCalendarLabel') ? document.getElementById('recruitCalendarLabel').value.trim() : ''
  };
}

function readActivitiesFromDom() {
  return Array.from(document.querySelectorAll('[data-activity-item]')).map((item) => ({
    articleId: item.getAttribute('data-id') || '',
    title: item.querySelector('[data-field="title"]').value.trim(),
    body: item.querySelector('[data-field="body"]').value.trim(),
    category: item.querySelector('[data-field="category"]').value,
    photoFolderId: item.querySelector('[data-field="photoFolderId"]').value,
    published: item.getAttribute('data-published') !== 'false',
    createdAt: item.getAttribute('data-created-at') || new Date().toISOString()
  }));
}

function readExhibitionsFromDom() {
  return sortExhibitions(Array.from(document.querySelectorAll('[data-exhibition-item]')).map((item) => ({
    exhibitionId: item.getAttribute('data-id') || '',
    displayBucket: item.getAttribute('data-bucket') || 'archive',
    startDate: item.querySelector('[data-field="startDate"]').value,
    title: item.querySelector('[data-field="title"]').value.trim(),
    theme: item.querySelector('[data-field="theme"]').value.trim(),
    venueName: item.querySelector('[data-field="venueName"]').value.trim(),
    venueAddress: item.querySelector('[data-field="venueAddress"]').value.trim(),
    dateLine: item.querySelector('[data-field="dateLine"]').value.trim(),
    timeLine: item.querySelector('[data-field="timeLine"]').value.trim(),
    mapEmbedUrl: item.querySelector('[data-field="mapEmbedUrl"]').value.trim(),
    driveFolderId: item.querySelector('[data-field="driveFolderId"]').value,
    published: item.getAttribute('data-published') !== 'false',
    draftCreatedAt: item.getAttribute('data-created-order') || '',
    works: Array.from(item.querySelectorAll('[data-exhibition-work]')).map((work) => ({
      imageFileName: work.querySelector('[data-field="imageFileName"]').value,
      workTitle: work.querySelector('[data-field="workTitle"]').value.trim(),
      artistName: work.querySelector('[data-field="artistName"]').value.trim()
    }))
  })));
}

function readRequestsFromDom() {
  return Array.from(document.querySelectorAll('[data-request-item]')).map((item) => ({
    caseId: item.getAttribute('data-id') || '',
    title: item.querySelector('[data-field="title"]').value.trim(),
    body: item.querySelector('[data-field="body"]').value.trim(),
    photoFolderId: item.querySelector('[data-field="photoFolderId"]').value,
    published: item.getAttribute('data-published') !== 'false'
  }));
}

function buildPayloadFromDom() {
  return {
    recruitCalendar: readRecruitFromDom(),
    activityArticles: readActivitiesFromDom(),
    exhibitions: readExhibitionsFromDom(),
    requestCases: readRequestsFromDom(),
    manualChangeNote: (document.getElementById('manualChangeNote') ? document.getElementById('manualChangeNote').value.trim() : (appState.state.manualChangeNote || ''))
  };
}


async function refreshMetaAfterDraftSave(currentPayload) {
  const data = await serverCall('getBootstrapData', appState.sessionToken);
  appState.options = data.options;
  appState.previewUrl = data.previewUrl || '';
  appState.drafts = data.drafts || [];
  appState.adminLog = data.adminLog || [];
  appState.maintenance = data.maintenance || appState.maintenance || { storage: null, recommendations: [] };
  appState.state = {
    ...(data.state || {}),
    ...(currentPayload || {}),
    changeLog: (data.state && data.state.changeLog) || appState.state.changeLog || []
  };
  renderAll();
  clearDirty();
}

async function loadDraftIntoEditor(draftId) {
  if (!confirm('現在の編集内容を下書きの内容で置き換えます。読み込みますか？')) return;
  try {
    setStatus('下書きを読み込んでいます…');
    const payload = await serverCall('loadDraft', appState.sessionToken, draftId);
    appState.state = { ...appState.state, ...payload };
    renderAll();
    markDirty();
    setStatus('下書きを読み込みました。', 'success');
  } catch (error) {
    setStatus(error.message, 'error');
  }
}

async function onSaveDraft() {
  if (!confirm('現在の内容を新しい下書きとして保存しますか？')) return;
  try {
    const payload = buildPayloadFromDom();
    setStatus('下書きを保存しています…');
    const result = await serverCall('saveDraft', appState.sessionToken, payload);
    setStatus(result.message, 'success');
    await refreshMetaAfterDraftSave(payload);
    clearDirty();
  } catch (error) {
    setStatus(error.message, 'error');
  }
}

async function onPublish() {
  if (!confirm('この内容で公開しますか？')) return;
  try {
    setStatus('公開処理を開始しています…');
    const result = await serverCall('publishState', appState.sessionToken, buildPayloadFromDom());
    setStatus(result.changeSummary || result.message, 'success');
    await loadBootstrap();
    clearDirty();
  } catch (error) {
    setStatus(error.message, 'error');
  }
}
function syncManualChangeNote() {
  const field = document.getElementById('manualChangeNote');
  appState.state.manualChangeNote = field ? field.value.replace(/\r\n?/g, '\n').replace(/^\n+|\n+$/g, '') : '';
}

</script>
