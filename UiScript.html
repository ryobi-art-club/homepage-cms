<script>
const appState = {
  sessionToken: '',
  viewerEmail: '',
  viewerName: '',
  previewUrl: '',
  drafts: [],
  adminLog: [],
  maintenance: { storage: null, recommendations: [] },
  options: {
    roots: {},
    recruitCalendars: [],
    activityPhotoFolders: [],
    exhibitionFolders: [],
    requestPhotoFolders: []
  },
  state: {
    recruitCalendars: [],
    recruitCalendar: { folderId: '', label: '' },
    activityArticles: [],
    exhibitions: [],
    requestCases: [],
    changeLog: [],
    manualChangeNote: ''
  },
  imageCache: {},
  mediaCache: {},
  dirty: false,
  suppressDirty: false
};

document.addEventListener('DOMContentLoaded', () => {
  bindGlobalEvents();
});

function bindGlobalEvents() {
  document.getElementById('requestOtpButton').addEventListener('click', onRequestOtp);
  document.getElementById('verifyOtpButton').addEventListener('click', onVerifyOtp);
  document.getElementById('saveDraftButton').addEventListener('click', onSaveDraft);
  document.getElementById('publishButton').addEventListener('click', onPublish);
  document.querySelectorAll('[data-panel-target]').forEach((button) => {
    button.addEventListener('click', () => activatePanel(button.getAttribute('data-panel-target')));
  });
  document.addEventListener('input', (event) => {
    if (event.target.closest && event.target.closest('#appShell')) markDirty();
  });
  document.addEventListener('change', (event) => {
    if (event.target.closest && event.target.closest('#appShell')) markDirty();
  });
  window.addEventListener('beforeunload', (event) => {
    if (!appState.dirty) return;
    event.preventDefault();
    event.returnValue = '';
  });
}

function activatePanel(panelId) {
  document.querySelectorAll('[data-panel-target]').forEach((button) => {
    button.classList.toggle('is-active', button.getAttribute('data-panel-target') === panelId);
  });
  document.querySelectorAll('[data-panel]').forEach((panel) => {
    panel.classList.toggle('is-active', panel.getAttribute('data-panel') === panelId);
  });
  if (panelId === 'logs') {
    renderLogs();
  }
}

function setStatus(message, kind = 'default') {
  const status = document.getElementById('statusMessage');
  status.textContent = message;
  status.style.color = kind === 'error' ? '#ffd5d5' : (kind === 'success' ? '#0a0a0a' : '');
  status.style.background = kind === 'error' ? 'rgba(243,108,108,0.18)' : (kind === 'success' ? 'rgba(136,196,132,0.92)' : 'rgba(255,255,255,0.04)');
}

function setAuthStatus(message, kind = 'default') {
  const box = document.getElementById('authStatus');
  box.innerHTML = `<div>${escapeHtml(message)}</div>`;
  box.style.color = kind === 'error' ? '#ffd5d5' : (kind === 'success' ? '#0a0a0a' : 'rgba(255,255,255,0.82)');
  box.style.background = kind === 'error' ? 'rgba(243,108,108,0.18)' : (kind === 'success' ? 'rgba(136,196,132,0.92)' : 'rgba(255,255,255,0.04)');
}

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatDate(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return [
    date.getFullYear(),
    String(date.getMonth() + 1).padStart(2, '0'),
    String(date.getDate()).padStart(2, '0')
  ].join('.');
}

function optionHtml(options, selectedId, includeBlankLabel) {
  const rows = [];
  if (includeBlankLabel) {
    rows.push(`<option value="">${escapeHtml(includeBlankLabel)}</option>`);
  }
  (options || []).forEach((item) => {
    rows.push(`<option value="${escapeHtml(item.id)}" ${item.id === selectedId ? 'selected' : ''}>${escapeHtml(item.name)}</option>`);
  });
  return rows.join('');
}

function serverCall(functionName, ...args) {
  if (window.MOCK_BACKEND && typeof window.MOCK_BACKEND[functionName] === 'function') {
    return Promise.resolve(window.MOCK_BACKEND[functionName](...args));
  }
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler((error) => reject(new Error(error && error.message ? error.message : String(error))))
      [functionName](...args);
  });
}

async function getFolderImagesCached(folderId, forceRefresh = false) {
  if (!folderId) return [];

  if (!forceRefresh && appState.imageCache[folderId]) {
    return appState.imageCache[folderId];
  }

  const images = await serverCall('getFolderImages', appState.sessionToken, folderId);
  appState.imageCache[folderId] = images || [];
  return appState.imageCache[folderId];
}

async function getFolderImagesFresh(folderId) {
  return getFolderImagesCached(folderId, true);
}

async function getFolderMediaCached(folderId, forceRefresh = false) {
  if (!folderId) return [];

  if (!forceRefresh && appState.mediaCache[folderId]) {
    return appState.mediaCache[folderId];
  }

  const files = await serverCall('getFolderMedia', appState.sessionToken, folderId);
  appState.mediaCache[folderId] = files || [];
  appState.imageCache[folderId] = (files || []).filter((file) => file.kind === 'image');
  return appState.mediaCache[folderId];
}

async function getFolderMediaFresh(folderId) {
  return getFolderMediaCached(folderId, true);
}

function invalidateFolderCache(folderId) {
  if (!folderId) return;
  delete appState.imageCache[folderId];
  delete appState.mediaCache[folderId];
}

function markDirty() {
  if (appState.suppressDirty) return;
  appState.dirty = true;
}

function clearDirty() {
  appState.dirty = false;
}

function syncCurrentEditorsToState() {
  try {
    if (document.querySelector('[data-recruit-item]')) {
      appState.state.recruitCalendars = readRecruitFromDom();
      appState.state.recruitCalendar = (appState.state.recruitCalendars || []).find((item) => item.published !== false) || (appState.state.recruitCalendars || [])[0] || {};
    }

    if (document.querySelector('[data-activity-item]')) {
      appState.state.activityArticles = readActivitiesFromDom();
    }

    if (document.querySelector('[data-exhibition-item]')) {
      appState.state.exhibitions = readExhibitionsFromDom();
    }

    if (document.querySelector('[data-request-item]')) {
      appState.state.requestCases = readRequestsFromDom();
    }

    syncManualChangeNote();
  } catch (error) {
    console.warn('編集中データの同期を一部スキップしました', error);
  }
}

function collectSelectedDriveFolderIds() {
  const ids = [];

  const recruit = appState.state.recruitCalendar || {};
  (appState.state.recruitCalendars || []).forEach((item) => {
    if (item.mediaFolderId || item.folderId) ids.push(item.mediaFolderId || item.folderId);
  });
  if (recruit.mediaFolderId || recruit.folderId) ids.push(recruit.mediaFolderId || recruit.folderId);

  (appState.state.activityArticles || []).forEach((item) => {
    if (item.mediaFolderId || item.photoFolderId) ids.push(item.mediaFolderId || item.photoFolderId);
  });

  (appState.state.exhibitions || []).forEach((item) => {
    if (item.mediaFolderId || item.driveFolderId) ids.push(item.mediaFolderId || item.driveFolderId);
  });

  (appState.state.requestCases || []).forEach((item) => {
    if (item.mediaFolderId || item.photoFolderId) ids.push(item.mediaFolderId || item.photoFolderId);
  });

  return Array.from(new Set(ids.filter(Boolean)));
}

function sortExhibitions(items) {
  const weight = { upcoming: 0, archive: 1 };
  return (items || []).slice().sort((a, b) => {
    const bucketA = Object.prototype.hasOwnProperty.call(weight, a.displayBucket) ? weight[a.displayBucket] : 99;
    const bucketB = Object.prototype.hasOwnProperty.call(weight, b.displayBucket) ? weight[b.displayBucket] : 99;
    if (bucketA !== bucketB) return bucketA - bucketB;
    const hasDateA = !!String(a.startDate || '').trim();
    const hasDateB = !!String(b.startDate || '').trim();
    if (!hasDateA && !hasDateB) return String(b.draftCreatedAt || '').localeCompare(String(a.draftCreatedAt || ''));
    if (!hasDateA) return -1;
    if (!hasDateB) return 1;
    if (a.displayBucket === 'upcoming') return String(a.startDate || '').localeCompare(String(b.startDate || ''));
    return String(b.startDate || '').localeCompare(String(a.startDate || ''));
  });
}

function visibleChipHtml(published) {
  return `<span class="visibility-chip${published ? '' : ' is-hidden'}">${published ? '公開中' : '非公開'}</span>`;
}

function normalizeIdList(value) {
  if (typeof value === 'string') {
    try { value = JSON.parse(value); } catch (error) { value = []; }
  }
  if (!Array.isArray(value)) return [];
  const out = [];
  value.forEach((item) => {
    const text = String(item || '').trim();
    if (text && out.indexOf(text) === -1) out.push(text);
  });
  return out;
}

function fileById(files, id) {
  return (files || []).find((file) => file.id === id) || null;
}

function orderedFilesByIds(files, ids) {
  const imageFiles = (files || []).filter((file) => file.kind === 'image');
  const used = new Set();
  const ordered = [];
  normalizeIdList(ids).forEach((id) => {
    const found = fileById(imageFiles, id);
    if (found && !used.has(found.id)) {
      ordered.push(found);
      used.add(found.id);
    }
  });
  imageFiles.forEach((file) => {
    if (!used.has(file.id)) ordered.push(file);
  });
  return ordered;
}

function mediaIdsForItem(item) {
  return normalizeIdList((item || {}).mediaFileIds || (item || {}).fileIds);
}

function ensureRecruitCalendars() {
  if (Array.isArray(appState.state.recruitCalendars) && appState.state.recruitCalendars.length) return;
  const base = appState.state.recruitCalendar || {};
  const year = String(base.year || new Date().getFullYear()).replace(/[^\d]/g, '').slice(0, 4) || String(new Date().getFullYear());
  appState.state.recruitCalendars = [{
    year,
    label: year + '年度 新歓イベントカレンダー',
    mediaFolderId: base.mediaFolderId || base.folderId || '',
    folderId: base.mediaFolderId || base.folderId || '',
    mediaFileIds: normalizeIdList(base.mediaFileIds),
    published: base.published !== false
  }];
}

function activityCategoryLabel(category) {
  const labels = { record: '活動記録', event: 'イベント告知', other: 'その他' };
  return labels[String(category || 'record')] || 'その他';
}

const GENERAL_IMAGE_LIMIT = 10;
const EXHIBITION_WORK_LIMIT = 200;

function limitFolderImages(images, limit) {
  const list = Array.isArray(images) ? images : [];
  return { total: list.length, items: list.slice(0, limit), hidden: Math.max(0, list.length - limit) };
}

function folderImageWarning(total, limit, label) {
  if (!(total > limit)) return '';
  return `<div class="warning-note">${escapeHtml(label)}は${limit}枚まで表示します（${total}枚中${limit}枚を使用）。</div>`;
}

function buildThumbCarouselHtml(images, poster=false) {
  const source = (images || []).slice(0, 10);
  if (!source.length) return '';
  if (poster) {
    const first = source[0];
    const firstUrl = escapeHtml(first.thumbnailUrl || first.image || first);
    const dots = source.length > 1 ? `<div class="preview-poster-dots">${source.slice(0, 2).map((_, index) => `<span class="${index === 0 ? 'is-active' : ''}"></span>`).join('')}</div>` : '';
    return `
      <div class="preview-carousel poster is-poster-carousel">
        <div class="preview-thumb"><img src="${firstUrl}" alt=""></div>
        ${dots}
      </div>`;
  }
  const visible = source.slice(0, 4);
  const extra = Math.max(0, source.length - visible.length);
  const countClass = `count-${Math.min(source.length, 4)}`;
  return `<div class="preview-carousel ${countClass}">${visible.map((img, index) => {
    const url = escapeHtml(img.thumbnailUrl || img.image || img);
    const more = (extra && index === visible.length - 1) ? `<span class="preview-more">+${extra}</span>` : '';
    return `<div class="preview-thumb"><img src="${url}" alt="">${more}</div>`;
  }).join('')}</div>`;
}


function buildRecruitPreviewHtml(images) {
  const source = (images || []).slice(0, 10);
  if (!source.length) return '';
  const first = source[0];
  const url = escapeHtml(first.thumbnailUrl || first.image || first);
  const dots = source.length > 1 ? `<div class="preview-recruit-dots">${source.map((_, index) => `<span class="${index === 0 ? 'is-active' : ''}"></span>`).join('')}</div>` : '';
  return `
    <div class="preview-recruit-carousel">
      <img src="${url}" alt="新歓イベントカレンダー">
      ${dots}
    </div>
  `;
}

function buildMetaListHtml(item) {
  const rows = [];
  const venueValue = `${item.venueName ? escapeHtml(item.venueName) : ''}${item.venueAddress ? `<span class="address">${escapeHtml(item.venueAddress)}</span>` : ''}`;
  const dateTimeValue = `${item.dateLine ? `<span>${escapeHtml(item.dateLine)}</span>` : ''}${item.timeLine ? `<span class="address">${escapeHtml(item.timeLine)}</span>` : ''}`;
  if (dateTimeValue) rows.push(`<div class="preview-meta-row"><div class="preview-meta-label">会期</div><div class="preview-meta-value">${dateTimeValue}</div></div>`);
  if (venueValue) rows.push(`<div class="preview-meta-row"><div class="preview-meta-label">会場</div><div class="preview-meta-value">${venueValue}</div></div>`);
  return rows.length ? `<div class="preview-meta-list">${rows.join('')}</div>` : '';
}

function buildExhibitionSubtitleHtml(item) {
  return item.subtitle ? `<div class="preview-exhibition-subtitle">${escapeHtml(item.subtitle)}</div>` : '';
}

const FILE_WARN_SIZE = 5 * 1024 * 1024;
const FILE_STRONG_WARN_SIZE = 10 * 1024 * 1024;
const FILE_MAX_SIZE = 20 * 1024 * 1024;
const FILE_TOTAL_WARN_SIZE = 50 * 1024 * 1024;
const URL_PROTOCOL = 'https:' + String.fromCharCode(47, 47);

function escapeJs(value) {
  return String(value == null ? '' : value)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\r?\n/g, '\\n');
}

function driveFolderUrl(folderId) {
  return URL_PROTOCOL + 'drive.google.com/drive/folders/' + encodeURIComponent(folderId || '');
}

function googleMapEmbedUrl(query) {
  return URL_PROTOCOL + 'www.google.com/maps?q=' + encodeURIComponent(query) + '&output=embed';
}

function ensureMediaDialog() {
  let dialog = document.getElementById('mediaDialog');
  if (dialog) return dialog;
  dialog = document.createElement('div');
  dialog.id = 'mediaDialog';
  dialog.className = 'media-modal hidden';
  dialog.innerHTML = [
    '<div class="media-modal-backdrop" onclick="closeMediaDialog()"></div>',
    '<div class="media-modal-panel" role="dialog" aria-modal="true" aria-labelledby="mediaDialogTitle">',
    '<div class="media-modal-head">',
    '<div>',
    '<h2 id="mediaDialogTitle">画像の設定</h2>',
    '<div id="mediaDialogSubtitle" class="small-note"></div>',
    '</div>',
    '<div id="mediaDialogStatus" class="media-dialog-status hidden"></div>',
    '<button class="icon-action-button" type="button" onclick="closeMediaDialog()" aria-label="閉じる"><i class="fa-solid fa-xmark"></i></button>',
    '</div>',
    '<div id="mediaDialogBody" class="media-modal-body"></div>',
    '</div>'
  ].join('');
  document.body.appendChild(dialog);
  return dialog;
}

function getContentRef(kind, index) {
  if (kind === 'recruit') {
    ensureRecruitCalendars();
    const item = (appState.state.recruitCalendars || [])[index] || (appState.state.recruitCalendars || [])[0];
    return {
      item,
      folderKey: 'mediaFolderId',
      title: item.label || '新歓イベントカレンダー',
      dialogTitle: '画像の設定',
      subtitle: '新歓イベントカレンダー'
    };
  }
  if (kind === 'activity') {
    const item = (appState.state.activityArticles || [])[index];
    return {
      item,
      folderKey: 'mediaFolderId',
      title: item && item.title ? item.title : '活動記録・告知',
      dialogTitle: '画像の設定',
      subtitle: '活動記録・告知'
    };
  }
  if (kind === 'request') {
    const item = (appState.state.requestCases || [])[index];
    return {
      item,
      folderKey: 'mediaFolderId',
      title: item && item.title ? item.title : '取り組み事例',
      dialogTitle: '画像の設定',
      subtitle: '取り組み事例'
    };
  }
  if (kind === 'exhibition') {
    const sorted = sortExhibitions(appState.state.exhibitions || []);
    const item = sorted[index];
    return {
      item,
      folderKey: 'mediaFolderId',
      title: item && item.title ? item.title : '展示会',
      dialogTitle: '画像・作品情報の設定',
      subtitle: '展示会'
    };
  }
  return { item: null, folderKey: '', title: '', dialogTitle: '画像の設定', subtitle: '' };
}

function currentMediaContext() {
  const active = appState.activeMedia || {};
  const ref = getContentRef(active.kind, active.index);
  return Object.assign({}, active, ref, {
    folderId: ref.item && ref.folderKey ? String(ref.item[ref.folderKey] || '') : ''
  });
}

async function openMediaDialog(kind, index = 0) {
  syncCurrentEditorsToState();
  appState.activeMedia = { kind, index };
  const context = currentMediaContext();
  if (!context.item) {
    setStatus('対象コンテンツが見つかりません。', 'error');
    return;
  }
  const dialog = ensureMediaDialog();
  dialog.classList.remove('hidden');
  document.body.classList.add('media-modal-open');
  document.getElementById('mediaDialogTitle').textContent = context.dialogTitle;
  document.getElementById('mediaDialogSubtitle').textContent = context.title;
  document.getElementById('mediaDialogBody').innerHTML = '<div class="preview-empty">素材を読み込んでいます…</div>';

  try {
    const files = context.folderId ? await getFolderMediaCached(context.folderId) : [];
    renderMediaDialog(files);
  } catch (error) {
    document.getElementById('mediaDialogBody').innerHTML = '<div class="preview-empty">' + escapeHtml(error.message || String(error)) + '</div>';
  }
}

function closeMediaDialog() {
  syncMediaEditorRowsToState();
  syncActiveMediaHiddenFields();
  const dialog = document.getElementById('mediaDialog');
  if (dialog) dialog.classList.add('hidden');
  document.body.classList.remove('media-modal-open');
}

function setMediaStatus(message, type) {
  const status = document.getElementById('mediaDialogStatus');
  if (!status) return;
  status.textContent = message || '';
  status.className = 'media-dialog-status' + (message ? ' is-visible' : ' hidden') + (type ? ' is-' + type : '');
}

function isMediaDialogOpen() {
  const dialog = document.getElementById('mediaDialog');
  return !!(dialog && !dialog.classList.contains('hidden'));
}

function renderMediaDialog(files) {
  const context = currentMediaContext();
  const imageFiles = (files || []).filter((file) => file.kind === 'image');
  const imageAccept = 'image/' + '*';
  const folderUrl = context.folderId ? driveFolderUrl(context.folderId) : '';
  const folderLinkHtml = folderUrl ? buildMediaFolderLinkHtml(folderUrl) : '';
  const uploadHtml = context.kind === 'exhibition' ? '' : renderMediaUploadBox('image', '画像を追加', context.kind);
  const sectionsHtml = context.kind === 'exhibition'
    ? renderExhibitionMediaSettings(imageFiles, context)
    : renderGenericMediaSettings(imageFiles, context);

  document.getElementById('mediaDialogBody').innerHTML = [
    uploadHtml,
    folderLinkHtml,
    sectionsHtml
  ].join('');
}

function renderMediaUploadBox(role, label, kind) {
  const imageAccept = 'image/' + '*';
  const note = kind === 'recruit'
    ? '推奨ファイルサイズは3MB以下です。新歓イベントカレンダー画像は16:9で作成してください。'
    : '推奨ファイルサイズは3MB以下です。';
  return [
    '<div class="media-upload-box">',
    '<div class="media-upload-row">',
    '<div class="field media-file-field">',
    '<label>' + escapeHtml(label) + '</label>',
    '<input id="mediaUploadInput_' + escapeHtml(role) + '" type="file" multiple accept="' + escapeHtml(imageAccept) + '">',
    '</div>',
    '<button class="button success" type="button" onclick="onMediaUpload(\'' + escapeJs(role) + '\')">アップロード</button>',
    '</div>',
    '<div class="small-note">' + escapeHtml(note) + '</div>',
    '</div>'
  ].join('');
}

function buildMediaFolderLinkHtml(folderUrl) {
  return [
    '<a class="root-link-row media-folder-link" href="',
    escapeHtml(folderUrl),
    '" target="_blank" rel="noopener noreferrer">',
    '<span>Driveで開く</span>',
    '</a>'
  ].join('');
}

function renderGenericMediaSettings(files, context) {
  const ordered = orderedFilesByIds(files, mediaIdsForItem(context.item));
  if (!ordered.length) {
    return '<div class="media-section"><h3>画像</h3><div class="preview-empty">画像は未設定です。</div></div>';
  }
  return [
    '<div class="media-section">',
    '<h3>画像</h3>',
    '<div class="small-note">ここで並べた順にサイトへ表示されます。</div>',
    '<div class="media-file-grid">',
    ordered.map((file, index) => renderGenericMediaCard(file, index, ordered.length)).join(''),
    '</div>',
    '</div>'
  ].join('');
}

function renderGenericMediaCard(file, index, count) {
  const context = currentMediaContext();
  const thumbClass = context.kind === 'recruit' ? 'media-file-thumb media-file-thumb-calendar' : 'media-file-thumb';
  return [
    '<article class="media-file-card">',
    '<div class="' + thumbClass + '"><img src="' + escapeHtml(file.thumbnailUrl) + '" alt=""></div>',
    '<div class="small-note">表示順 ' + (index + 1) + ' / ' + formatBytes(file.size || 0) + '</div>',
    '<div class="media-file-actions">',
    '<button class="button subtle" type="button" onclick="moveMediaFile(\'' + escapeJs(file.id) + '\', -1)" ' + (index === 0 ? 'disabled' : '') + '>前へ</button>',
    '<button class="button subtle" type="button" onclick="moveMediaFile(\'' + escapeJs(file.id) + '\', 1)" ' + (index === count - 1 ? 'disabled' : '') + '>次へ</button>',
    '<button class="button danger" type="button" onclick="onMediaDelete(\'' + escapeJs(file.id) + '\', \'' + escapeJs(file.name) + '\')">削除</button>',
    '</div>',
    '</article>'
  ].join('');
}

function renderExhibitionMediaSettings(files, context) {
  const item = context.item || {};
  const dmIds = normalizeIdList(item.dmFileIds);
  const works = (item.workFiles || item.works || []).map((work, index) => {
    const fileId = work.fileId || work.file_id;
    return Object.assign({}, work, { fileId, sortOrder: Number(work.sortOrder || work.sort_order || index + 1) });
  }).filter((work) => work.fileId && fileById(files, work.fileId)).sort((a, b) => a.sortOrder - b.sortOrder);
  const assigned = new Set(dmIds.concat(works.map((work) => work.fileId)).filter(Boolean));
  const unassigned = files.filter((file) => !assigned.has(file.id));
  return [
    '<div class="media-section">',
    '<h3>DM画像</h3>',
    renderMediaUploadBox('dm', 'DM画像を追加', 'exhibition'),
    renderExhibitionDmList(files, dmIds),
    '</div>',
    '<div class="media-section">',
    '<h3>作品画像</h3>',
    renderMediaUploadBox('work', '作品画像を追加', 'exhibition'),
    '<div class="small-note">表示順は、スマートフォン表示と拡大表示時のスライド順に反映されます。PCでは画像の縦横比に合わせて、見やすい配置に自動調整されます。</div>',
    '<div class="media-file-grid media-work-grid">',

function validateMediaSelection(files, role, context) {
  if (!files.length) throw new Error('アップロードするファイルを選択してください。');
  if (context.kind === 'exhibition' && role === 'dm') {
    const currentCount = normalizeIdList(context.item && context.item.dmFileIds).length;
    if (currentCount + files.length > 2) throw new Error('DM画像は表・裏の2枚までです。不要なDM画像を削除してから追加してください。');
  }
  let total = 0;
  const warnings = [];
  Array.from(files).forEach((file) => {
    total += file.size || 0;
    if (file.size > FILE_MAX_SIZE) {
      throw new Error(file.name + ' は20MBを超えています。圧縮または分割してください。');
    }
    if (!file.type.startsWith('image/')) {
      throw new Error(file.name + ' は画像ファイルではありません。');
    }
    if (file.size > FILE_STRONG_WARN_SIZE) warnings.push(file.name + ': ' + formatBytes(file.size) + '（大きめ）');
    else if (file.size > FILE_WARN_SIZE) warnings.push(file.name + ': ' + formatBytes(file.size));
  });
  if (total > FILE_TOTAL_WARN_SIZE) warnings.push('合計: ' + formatBytes(total));
  if (warnings.length) {
    return confirm('大きいファイルが含まれています。\nアップロードに時間がかかる場合があります。\n\n' + warnings.join('\n') + '\n\n続行しますか？');
  }
  return true;
}

function readFilePayload(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const value = String(reader.result || '');
      resolve({
        name: file.name,
        mimeType: file.type || 'application/octet-stream',
        data: value.indexOf(',') >= 0 ? value.split(',').pop() : value
      });
    };
    reader.onerror = () => reject(reader.error || new Error('ファイルの読み込みに失敗しました。'));
    reader.readAsDataURL(file);
  });
}

async function onMediaUpload(uploadRole) {
  const context = currentMediaContext();
  const role = uploadRole || 'image';
  const input = document.getElementById('mediaUploadInput_' + role);
  const selected = input && input.files ? Array.from(input.files) : [];

  try {
    if (!validateMediaSelection(selected, role, context)) return;
    syncMediaEditorRowsToState();
    document.getElementById('mediaDialogBody').classList.add('is-loading');
    setMediaStatus('ファイルをアップロードしています…');
    setStatus('ファイルをアップロードしています…');
    const files = await Promise.all(selected.map(readFilePayload));
    const beforeIds = new Set(((context.folderId && appState.mediaCache[context.folderId]) || []).map((file) => file.id));
    const result = await serverCall('uploadManagedFiles', appState.sessionToken, {
      kind: context.kind,
      role,
      folderId: context.folderId,
      title: context.title,
      draft: true,
      files
    });
    const newIds = (result.files || []).filter((file) => !beforeIds.has(file.id)).map((file) => file.id);
    applyMediaResult(result, { type: 'upload', role, newIds });
    renderMediaDialog(result.files || []);
    setMediaStatus('アップロードしました。', 'success');
    setStatus('アップロードしました。', 'success');
  } catch (error) {
    setMediaStatus(error.message, 'error');
    setStatus(error.message, 'error');
  } finally {
    const body = document.getElementById('mediaDialogBody');
    if (body) body.classList.remove('is-loading');
  }
}

function applyMediaResult(result, mutation) {
  const context = currentMediaContext();
  if (!context.item || !context.folderKey) return;
  const folderId = result && result.folderId ? result.folderId : '';
  const oldFolderId = context.item[context.folderKey] || '';
  context.item[context.folderKey] = folderId;
  context.item.folderId = folderId;
  if (oldFolderId && oldFolderId !== folderId) invalidateFolderCache(oldFolderId);
  if (folderId) {
    appState.mediaCache[folderId] = result.files || [];
    appState.imageCache[folderId] = (result.files || []).filter((file) => file.kind === 'image');
  }

  if (context.kind === 'exhibition') {
    const currentIds = new Set((result.files || []).map((file) => file.id));
    let dmFileIds = normalizeIdList(context.item.dmFileIds).filter((id) => currentIds.has(id));
    let workFiles = (context.item.workFiles || context.item.works || []).filter((work) => currentIds.has(work.fileId || work.file_id));
    if (mutation && mutation.type === 'upload') {
      const imageIds = (mutation.newIds || []).filter((id) => currentIds.has(id));
      if (mutation.role === 'dm') {
        dmFileIds = dmFileIds.concat(imageIds).slice(0, 2);
      } else if (mutation.role === 'work') {
        const start = workFiles.length;
        imageIds.forEach((id, offset) => {
          if (!workFiles.some((work) => (work.fileId || work.file_id) === id)) {
            workFiles.push({ fileId: id, sortOrder: start + offset + 1, title: '', artist: '' });
          }
        });
      }
    }
    context.item.dmFileIds = dmFileIds;
    context.item.workFiles = workFiles
      .map((work) => Object.assign({}, work, { fileId: work.fileId || work.file_id }))
      .filter((work) => work.fileId)
      .sort((a, b) => Number(a.sortOrder || a.sort_order || 0) - Number(b.sortOrder || b.sort_order || 0))
      .map((work, index) => Object.assign({}, work, { sortOrder: index + 1 }));
    context.item.works = context.item.workFiles;
  } else {
    const currentIds = new Set((result.files || []).filter((file) => file.kind === 'image').map((file) => file.id));
    let ids = normalizeIdList(context.item.mediaFileIds).filter((id) => currentIds.has(id));
    (result.files || []).filter((file) => file.kind === 'image').forEach((file) => {
      if (ids.indexOf(file.id) === -1) ids.push(file.id);
    });
    context.item.mediaFileIds = ids;
  }

  markDirty();
  syncActiveMediaHiddenFields();
  refreshPreviewForKind(context.kind);
}

function moveMediaFile(fileId, delta) {
  const context = currentMediaContext();
  if (!context.item) return;
  const files = context.folderId ? (appState.mediaCache[context.folderId] || []) : [];
  const orderedIds = orderedFilesByIds(files, mediaIdsForItem(context.item)).map((file) => file.id);
  const index = orderedIds.indexOf(fileId);
  const next = index + delta;
  if (index < 0 || next < 0 || next >= orderedIds.length) return;
  const tmp = orderedIds[index];
  orderedIds[index] = orderedIds[next];
  orderedIds[next] = tmp;
  context.item.mediaFileIds = orderedIds;
  markDirty();
  syncActiveMediaHiddenFields();
  renderMediaDialog(files);
  refreshPreviewForKind(context.kind);
}

function syncMediaEditorRowsToState() {
  if (!isMediaDialogOpen()) return;
  const context = currentMediaContext();
  if (!context.item || context.kind !== 'exhibition') return;
  const workFiles = [];
  document.querySelectorAll('[data-exhibition-media-row]').forEach((row, index) => {
    const fileId = row.getAttribute('data-file-id') || '';
    workFiles.push({
      fileId,
      sortOrder: index + 1,
      title: row.querySelector('[data-field="workTitle"]').value.trim(),
      artist: row.querySelector('[data-field="artistName"]').value.trim()
    });
  });
  context.item.workFiles = workFiles;
  context.item.works = context.item.workFiles;
}

function syncActiveMediaHiddenFields() {
  const context = currentMediaContext();
  if (!context.item || !context.folderKey) return;

  const selectorMap = {
    recruit: '[data-recruit-item]',
    activity: '[data-activity-item]',
    exhibition: '[data-exhibition-item]',
    request: '[data-request-item]'
  };
  const element = document.querySelectorAll(selectorMap[context.kind] || '')[context.index];
  if (!element) return;

  const folderInput = element.querySelector('[data-field="mediaFolderId"]');
  if (folderInput) folderInput.value = context.item[context.folderKey] || '';

  if (context.kind === 'exhibition') {
    const dmInput = element.querySelector('[data-field="dmFileIds"]');
    const workInput = element.querySelector('[data-field="workFiles"]');
    if (dmInput) dmInput.value = JSON.stringify(normalizeIdList(context.item.dmFileIds));
    if (workInput) workInput.value = JSON.stringify(context.item.workFiles || context.item.works || []);
    return;
  }

  const mediaInput = element.querySelector('[data-field="mediaFileIds"]');
  if (mediaInput) mediaInput.value = JSON.stringify(normalizeIdList(context.item.mediaFileIds));
}

function refreshPreviewForKind(kind) {
  if (kind === 'recruit') loadRecruitPreview();
  if (kind === 'activity') refreshActivityPreview();
  if (kind === 'exhibition') refreshExhibitionPreview();
  if (kind === 'request') refreshRequestPreview();
}

function moveExhibitionDm(fileId, delta) {
  const context = currentMediaContext();
  if (!context.item) return;
  syncMediaEditorRowsToState();
  const ids = normalizeIdList(context.item.dmFileIds);
  const index = ids.indexOf(fileId);
  const next = index + delta;
  if (index < 0 || next < 0 || next >= ids.length) return;
  const tmp = ids[index];
  ids[index] = ids[next];
  ids[next] = tmp;
  context.item.dmFileIds = ids;
  markDirty();
  syncActiveMediaHiddenFields();
  renderMediaDialog(context.folderId ? (appState.mediaCache[context.folderId] || []) : []);
  refreshPreviewForKind('exhibition');
}

function moveExhibitionWork(fileId, delta) {
  const context = currentMediaContext();
  if (!context.item) return;
  syncMediaEditorRowsToState();
  const works = (context.item.workFiles || []).slice().sort((a, b) => a.sortOrder - b.sortOrder);
  const index = works.findIndex((work) => work.fileId === fileId);
  const next = index + delta;
  if (index < 0 || next < 0 || next >= works.length) return;
  const tmp = works[index];
  works[index] = works[next];
  works[next] = tmp;
  context.item.workFiles = works.map((work, idx) => Object.assign({}, work, { sortOrder: idx + 1 }));
  context.item.works = context.item.workFiles;
  markDirty();
  syncActiveMediaHiddenFields();
  renderMediaDialog(context.folderId ? (appState.mediaCache[context.folderId] || []) : []);
  refreshPreviewForKind('exhibition');
}

function assignExhibitionFile(fileId, role) {
  const context = currentMediaContext();
  if (!context.item) return;
  syncMediaEditorRowsToState();
  context.item.dmFileIds = normalizeIdList(context.item.dmFileIds).filter((id) => id !== fileId);
  context.item.workFiles = (context.item.workFiles || []).filter((work) => work.fileId !== fileId);
  if (role === 'dm') {
    if (context.item.dmFileIds.length >= 2) {
      setMediaStatus('DM画像は表・裏の2枚までです。不要なDM画像を削除してから追加してください。', 'error');
      return;
    }
    context.item.dmFileIds.push(fileId);
  }
  if (role === 'work') {
    context.item.workFiles.push({ fileId, sortOrder: context.item.workFiles.length + 1, title: '', artist: '' });
  }
  context.item.works = context.item.workFiles;
  markDirty();
  syncActiveMediaHiddenFields();
  renderMediaDialog(context.folderId ? (appState.mediaCache[context.folderId] || []) : []);
  refreshPreviewForKind('exhibition');
}

function rerenderAfterMediaChange(kind) {

function formatBytes(bytes) {
  const value = Number(bytes || 0);
  if (!value) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let size = value;
  let unit = 0;
  while (size >= 1024 && unit < units.length - 1) {
    size /= 1024;
    unit += 1;
  }
  return `${size.toFixed(unit >= 3 ? 1 : 0)} ${units[unit]}`;
}

async function loadRecruitPreview(forceRefresh = false) {
  const items = readRecruitFromDom();
  const recruit = items.find((item) => item.published !== false) || items[0] || {};
  const preview = document.getElementById('recruitPreview');

  if (!preview) return;
  const folderId = recruit.mediaFolderId || recruit.folderId || '';
  if (!folderId) {
    preview.innerHTML = '<div class="preview-empty">画像は未設定です。</div>';
    return;
  }

  const label = recruit.label || '新歓イベントカレンダー';
  preview.innerHTML = '<div class="preview-empty">画像を読み込んでいます…</div>';

  try {
    const files = await getFolderImagesCached(folderId, forceRefresh);
    const images = orderedFilesByIds(files, mediaIdsForItem(recruit)).slice(0, GENERAL_IMAGE_LIMIT);
    preview.innerHTML = `
      <div class="preview-site">
        <article class="preview-site-card">
          <span class="preview-site-kicker">WELCOME CALENDAR</span>
          <h4>${escapeHtml(label)}</h4>
          ${buildRecruitPreviewHtml(images)}
          ${folderImageWarning(files.length, GENERAL_IMAGE_LIMIT, '画像')}
        </article>
      </div>
    `;
  } catch (error) {
    preview.innerHTML = `<div class="preview-empty">${escapeHtml(error.message || String(error))}</div>`;
  }
}

    .filter((year) => year > 0);
  const nextYear = String(years.length ? Math.max.apply(null, years) + 1 : new Date().getFullYear());
  appState.state.recruitCalendars.push({
    year: nextYear,

async function renderExhibitionPreview(items) {
  const visible = sortExhibitions((items || []).filter((item) => item.published !== false));
  const upcoming = visible.filter((item) => item.displayBucket === 'upcoming');
  const archive = visible.filter((item) => item.displayBucket === 'archive');
  const recent = archive.length ? archive[0] : null;
  const archiveRest = archive.slice(1);
  const sections = [];

  if (upcoming.length) {
    const upcomingCards = await Promise.all(upcoming.map(async (item, idx) => {
      const images = await getFolderImagesCached(item.mediaFolderId || item.driveFolderId);
      const dm = normalizeIdList(item.dmFileIds).map((id) => fileById(images, id)).filter(Boolean);
      return `
        <article class="preview-site-card">
          <span class="preview-site-kicker">${idx === 0 ? 'NEXT EXHIBITION' : 'UPCOMING'}</span>
          ${buildExhibitionSubtitleHtml(item)}
          <h4>${escapeHtml(item.title || '展示会名')}</h4>
          <div class="preview-exhibition-layout">
            <div class="preview-exhibition-copy">
              <p class="preview-exhibition-overview">${escapeHtml(item.theme || '')}</p>
              <div class="preview-exhibition-meta">${buildMetaListHtml(item)}</div>
            </div>
            <div class="preview-dm-slot">${buildThumbCarouselHtml(dm, true)}</div>
          </div>
        </article>
      `;
    }));
    sections.push(upcomingCards.join(''));
  }

  if (recent) {
    const images = await getFolderImagesCached(recent.mediaFolderId || recent.driveFolderId);
    const dm = normalizeIdList(recent.dmFileIds).map((id) => fileById(images, id)).filter(Boolean);
    const workImages = (recent.workFiles || recent.works || []).map((work) => {
      const found = fileById(images, work.fileId || work.file_id);
      return found ? { thumbnailUrl: found.thumbnailUrl, title: work.title || work.workTitle, artist: work.artist || work.artistName } : null;
    }).filter(Boolean);
    sections.push(`
      <article class="preview-site-card">
        <span class="preview-site-kicker">RECENT EXHIBITION</span>
        ${buildExhibitionSubtitleHtml(recent)}
        <h4>${escapeHtml(recent.title || '展示会名')}</h4>
        <div class="preview-exhibition-layout">
          <div class="preview-exhibition-copy">
            <p class="preview-exhibition-overview">${escapeHtml(recent.theme || '')}</p>
            <div class="preview-exhibition-meta">${buildMetaListHtml(recent)}</div>
          </div>
          <div class="preview-dm-slot">${buildThumbCarouselHtml(dm, true)}</div>
        </div>
        ${workImages.length ? `<div class="preview-work-grid">${workImages.map((work) => `
          <div class="preview-work-card">
            <img src="${escapeHtml(work.thumbnailUrl)}" alt="">
            <div style="font-weight:700">${escapeHtml(work.title || '')}</div>
            <div class="small-note">${escapeHtml(work.artist || '')}</div>
          </div>`).join('')}</div>` : ''}
      </article>
    `);
  }

  const archiveCards = await Promise.all(archiveRest.map(async (item) => {
    const archiveImages = await getFolderImagesCached(item.mediaFolderId || item.driveFolderId);
    const archiveDm = normalizeIdList(item.dmFileIds).map((id) => fileById(archiveImages, id)).filter(Boolean);
    const folderId = item.mediaFolderId || item.driveFolderId || '';
    return `
      <div class="preview-archive-item">
        <div class="preview-archive-body">
          ${buildExhibitionSubtitleHtml(item)}
          <div style="font-weight:700; margin-bottom:6px;">${escapeHtml(item.title || '')}</div>
          <div class="preview-dm-slot">${buildThumbCarouselHtml(archiveDm, true)}</div>
          <div class="small-note" style="margin-bottom:8px;">${escapeHtml(item.theme || '')}</div>
          ${buildMetaListHtml(item)}
          ${folderId ? `<div class="preview-drive-wrap"><a class="button subtle" href="${escapeHtml(driveFolderUrl(folderId))}" target="_blank" rel="noopener noreferrer">Google Driveで見る</a></div>` : ''}
        </div>
      </div>`;
  }));

  sections.push(`
    <article class="preview-site-card">
      <span class="preview-site-kicker">ARCHIVE</span>
      <h4>展示会アーカイブ</h4>
      ${archiveCards.length ? `<div class="preview-archive-list">${archiveCards.join('')}</div>` : '<div class="preview-empty">公開中のアーカイブはありません。</div>'}
    </article>
  `);

  return `<div class="preview-site">${sections.join('')}</div>`;
}

    subtitle: '',
    theme: '',
    venueName: '',
    venueAddress: '',
    dateLine: '',
    timeLine: '',
    mapEmbedUrl: '',
    mediaFolderId: '',
    dmFileIds: [],
    workFiles: [],
    published: true,
    draftCreatedAt: new Date(Date.now() + 3600 * 1000).toISOString(),
    works: []
  });
  renderExhibitionsEditor();
}

function toggleExhibitionPublished(index) {
  appState.state.exhibitions = readExhibitionsFromDom();
  const sorted = sortExhibitions(appState.state.exhibitions);
  const item = sorted[index];
  if (!item) return;
  item.published = item.published === false;
  renderExhibitionsEditor();
}

function removeExhibition(index) {
  if (!confirm('この展示会を削除しますか？\n公開済みのコンテンツは削除ではなく非公開推奨です。')) return;
  appState.state.exhibitions = readExhibitionsFromDom();
  const sorted = sortExhibitions(appState.state.exhibitions);
  const target = sorted[index];
  appState.state.exhibitions = (appState.state.exhibitions || []).filter((item) => item !== target);
  renderExhibitionsEditor();
}


function toggleExhibitionBucket(index) {
  appState.state.exhibitions = readExhibitionsFromDom();
  const sorted = sortExhibitions(appState.state.exhibitions);
  const target = sorted[index];
  if (!target) return;
  target.displayBucket = target.displayBucket === 'upcoming' ? 'archive' : 'upcoming';
  appState.state.exhibitions = sortExhibitions(appState.state.exhibitions || []);
  renderExhibitionsEditor();
}

function autofillExhibitionMap(index) {
  const item = document.querySelector(`[data-exhibition-item][data-index="${index}"]`);
  if (!item) return;
  const venueName = item.querySelector('[data-field="venueName"]').value.trim();
  const venueAddress = item.querySelector('[data-field="venueAddress"]').value.trim();
  const query = [venueName, venueAddress].filter(Boolean).join(' ');
  if (!query) {
    alert('会場名または会場住所を入力してください。');
    return;
  }
  item.querySelector('[data-field="mapEmbedUrl"]').value = googleMapEmbedUrl(query);
  refreshExhibitionPreview();
}

async function refreshExhibitionPreview() {
  const html = await renderExhibitionPreview(readExhibitionsFromDom());
  document.getElementById('exhibitionPreview').innerHTML = html;
}

function renderRequestsEditor() {
  const panel = document.getElementById('panel-requests');
  const items = appState.state.requestCases || [];
  panel.innerHTML = `
    <div class="grid-2">
      <div class="card">
        <div class="editor-item-head">
          <div>
            <h2>ご依頼の方</h2>
            <div class="small-note">紹介したい取り組み事例を並べます。新しく追加した事例は先頭に配置されます。</div>
          </div>
          <div class="item-actions">
            <button class="button" type="button" onclick="addRequestCase()">取り組み事例を追加</button>
          </div>
        </div>
        <div id="requestEditorList" class="editor-list">
          ${items.map((item, index) => renderRequestEditorItem(item, index)).join('')}
        </div>
      </div>
      <div class="card">
        <h3>プレビュー</h3>
        <div id="requestPreview" class="preview-pane preview-frame"><div class="preview-empty">読み込み中…</div></div>
      </div>
    </div>
  `;
  refreshRequestPreview();
}

function renderRequestEditorItem(item, index) {
  const published = item.published !== false;
  return `
    <article class="editor-item" data-request-item data-index="${index}" data-id="${escapeHtml(item.caseId || '')}" data-published="${published ? 'true' : 'false'}" data-bucket="${escapeHtml(item.displayBucket || 'archive')}">
      <div class="editor-item-head">
        <div>
          <div class="item-title-line">
            <div data-live-title style="font-weight:700">${escapeHtml(item.title || '新規事例')}</div>
            ${visibleChipHtml(published)}
          </div>
          <div class="editor-item-meta">表示順 ${index + 1}</div>
        </div>
        <div class="item-actions">
          <button class="button" type="button" onclick="moveRequestCase(${index}, -1)">↑</button>
          <button class="button" type="button" onclick="moveRequestCase(${index}, 1)">↓</button>
          <button class="button hidden-toggle ${published ? '' : 'is-hidden'}" type="button" onclick="toggleRequestPublished(${index})">${published ? '非公開' : '公開に戻す'}</button>
          <button class="button danger" type="button" onclick="removeRequestCase(${index})">削除</button>
        </div>
      </div>
      <div class="form-grid">
        <div class="field full">
          <label>取り組みタイトル</label>
          <input data-field="title" value="${escapeHtml(item.title || '')}" oninput="updateEditorCardTitle(this, '新規事例'); refreshRequestPreview()">
        </div>
        <div class="field full">
          <label>本文</label>
          <textarea data-field="body" oninput="refreshRequestPreview()">${escapeHtml(item.body || '')}</textarea>
        </div>
        <div class="field full">
          <label>画像</label>
          <input data-field="mediaFolderId" type="hidden" value="${escapeHtml(item.mediaFolderId || item.photoFolderId || '')}">
          <input data-field="mediaFileIds" type="hidden" value="${escapeHtml(JSON.stringify(mediaIdsForItem(item)))}">
          <button class="button subtle" type="button" onclick="openMediaDialog('request', ${index})">画像の設定</button>
        </div>
      </div>
    </article>
  `;
}


async function renderRequestPreview(items) {
  const visible = (items || []).filter((item) => item.published !== false);
  if (!visible.length) return '<div class="preview-empty">公開中の事例はありません。</div>';
  const cards = await Promise.all(visible.map(async (item, index) => {
    const folderId = item.mediaFolderId || item.photoFolderId || '';
    const files = folderId ? await getFolderImagesCached(folderId) : [];
    const imageResult = folderId ? { total: files.length, items: orderedFilesByIds(files, mediaIdsForItem(item)).slice(0, GENERAL_IMAGE_LIMIT) } : { total: 0, items: [] };
    return `
      <article class="preview-site-card">
        <span class="preview-site-kicker">REQUESTS</span>
        <div class="preview-inline-meta"><span>表示順 ${index + 1}</span></div>
        <h4>${escapeHtml(item.title || 'タイトル未入力')}</h4>
        <p>${escapeHtml(item.body || '本文未入力')}</p>
        ${buildThumbCarouselHtml(imageResult.items)}
        ${folderImageWarning(imageResult.total, GENERAL_IMAGE_LIMIT, '画像')}
      </article>
    `;
  }));
  return `<div class="preview-site">${cards.join('')}</div>`;
}

function addRequestCase() {
  appState.state.requestCases = readRequestsFromDom();
  appState.state.requestCases.unshift({
    caseId: '',
    title: '',
    body: '',
    mediaFolderId: '',
    mediaFileIds: [],
    published: true
  });
  renderRequestsEditor();
}

function moveRequestCase(index, delta) {
  appState.state.requestCases = readRequestsFromDom();
  const target = index + delta;
  if (target < 0 || target >= appState.state.requestCases.length) return;
  const items = appState.state.requestCases;
  const tmp = items[index];
  items[index] = items[target];
  items[target] = tmp;
  renderRequestsEditor();
}

function toggleRequestPublished(index) {
  appState.state.requestCases = readRequestsFromDom();
  const item = appState.state.requestCases[index];
  if (!item) return;
  item.published = item.published === false;
  renderRequestsEditor();
}

function removeRequestCase(index) {
  if (!confirm('この事例を削除しますか？\n公開済みのコンテンツは削除ではなく非公開推奨です。')) return;
  appState.state.requestCases = readRequestsFromDom();
  appState.state.requestCases.splice(index, 1);
  renderRequestsEditor();
}

async function refreshRequestPreview() {
  const html = await renderRequestPreview(readRequestsFromDom());
  document.getElementById('requestPreview').innerHTML = html;
}

let logsPreviewTimer = 0;
let logsPreviewRequestSeq = 0;

function scheduleLogsPreviewRefresh() {
  if (logsPreviewTimer) clearTimeout(logsPreviewTimer);
  logsPreviewTimer = setTimeout(() => {
    logsPreviewTimer = 0;
    renderLogsPreviewContent();
  }, 350);
}

function buildLogsPreviewCardHtml(compared, noteHtml, isLoading) {
  const items = compared || [];
  return `
      <div class="card">
        <h2>サイトの更新履歴プレビュー</h2>
        <div class="small-note" style="margin-bottom:12px;">緑は今回の公開で新しく表示される項目、赤は今回の公開でサイト上から非表示になる項目です。</div>
        <div class="preview-sim-legend">
          <span class="preview-sim-chip is-added">追加・再表示</span>
          <span class="preview-sim-chip is-removed">非表示</span>
          <span class="preview-sim-chip is-unchanged">継続表示</span>
        </div>
        ${noteHtml || ''}
        <div class="preview-sim-list">
          ${items.length ? items.map((entry) => `
            <div class="preview-sim-item">
              <div class="preview-sim-date">${escapeHtml(entry.date)}</div>
              <ul class="preview-sim-bullets">${entry.items.map((item) => `<li class="is-${escapeHtml(item.status)}"><span class="preview-sim-badge is-${escapeHtml(item.status)}">${item.status === 'added' ? '追加' : (item.status === 'removed' ? '非表示' : '継続')}</span><span class="preview-sim-text">${escapeHtml(item.summary)}</span></li>`).join('')}</ul>
            </div>`).join('') : (isLoading ? '' : '<div class="small-note">まだ履歴がありません。</div>')}
        </div>
      </div>
  `;
}

async function renderLogsPreviewContent() {
  const wrap = document.getElementById('logsPreviewContent');
  if (!wrap) return;
  const requestSeq = ++logsPreviewRequestSeq;
  wrap.innerHTML = buildLogsPreviewCardHtml([], '<div class="small-note" style="margin-bottom:12px;">公開後の履歴を確認しています...</div>', true);
  try {
    const data = await serverCall('previewSiteHistory', appState.sessionToken, buildPayloadFromDom());
    if (requestSeq !== logsPreviewRequestSeq || !document.getElementById('logsPreviewContent')) return;
    wrap.innerHTML = buildLogsPreviewCardHtml((data && data.compared) || []);
  } catch (error) {
    if (requestSeq !== logsPreviewRequestSeq || !document.getElementById('logsPreviewContent')) return;
    wrap.innerHTML = buildLogsPreviewCardHtml([], '<div class="small-note error-text" style="margin-bottom:12px;">更新履歴プレビューを取得できませんでした: ' + escapeHtml(error.message || error) + '</div>');
  }
}

function renderLogs() {
  const panel = document.getElementById('panel-logs');
  panel.innerHTML = `
    <div class="stack">
      <div class="card">
        <h2>更新履歴メモ</h2>
        <div class="small-note">必要なときだけ、自由記述の履歴を追加できます。サイト側の履歴には現在の公開状態に応じて表示されます。</div>
        <div class="field full" style="margin-top:14px;">
          <label>フリーテキスト履歴（改行ごとに1項目）</label>
          <textarea id="manualChangeNote" placeholder="例: 会場のご案内を更新しました。\n次回展示の詳細を追記しました。" oninput="syncManualChangeNote(); scheduleLogsPreviewRefresh();">${escapeHtml(appState.state.manualChangeNote || '')}</textarea>
        </div>
      </div>
      <div id="logsPreviewContent"></div>
    </div>
  `;
  renderLogsPreviewContent();
}

function readRecruitFromDom() {
  return sortRecruitCalendars(Array.from(document.querySelectorAll('[data-recruit-item]')).map((item) => {
    const year = item.querySelector('[data-field="year"]').value.replace(/[^\d]/g, '').slice(0, 4);
    return {
      year,
      label: year ? year + '年度 新歓イベントカレンダー' : '新歓イベントカレンダー',
      mediaFolderId: item.querySelector('[data-field="mediaFolderId"]').value,
      folderId: item.querySelector('[data-field="mediaFolderId"]').value,
      mediaFileIds: normalizeIdList(item.querySelector('[data-field="mediaFileIds"]').value),
      published: item.getAttribute('data-published') !== 'false'
    };
  }));
}

function readActivitiesFromDom() {
  return Array.from(document.querySelectorAll('[data-activity-item]')).map((item) => ({
    articleId: item.getAttribute('data-id') || '',
    title: item.querySelector('[data-field="title"]').value.trim(),
    body: item.querySelector('[data-field="body"]').value.trim(),
    category: item.querySelector('[data-field="category"]').value,
    mediaFolderId: item.querySelector('[data-field="mediaFolderId"]').value,
    photoFolderId: item.querySelector('[data-field="mediaFolderId"]').value,
    mediaFileIds: normalizeIdList(item.querySelector('[data-field="mediaFileIds"]').value),
    published: item.getAttribute('data-published') !== 'false',
    createdAt: item.getAttribute('data-created-at') || new Date().toISOString()
  }));
}

function readExhibitionsFromDom() {
  return sortExhibitions(Array.from(document.querySelectorAll('[data-exhibition-item]')).map((item) => ({
    exhibitionId: item.getAttribute('data-id') || '',
    displayBucket: item.getAttribute('data-bucket') || 'archive',
    startDate: item.querySelector('[data-field="startDate"]').value,
    title: item.querySelector('[data-field="title"]').value.trim(),
    subtitle: item.querySelector('[data-field="subtitle"]').value.trim(),
    theme: item.querySelector('[data-field="theme"]').value.trim(),
    venueName: item.querySelector('[data-field="venueName"]').value.trim(),
    venueAddress: item.querySelector('[data-field="venueAddress"]').value.trim(),
    dateLine: item.querySelector('[data-field="dateLine"]').value.trim(),
    timeLine: item.querySelector('[data-field="timeLine"]').value.trim(),
    mapEmbedUrl: item.querySelector('[data-field="mapEmbedUrl"]').value.trim(),
    mediaFolderId: item.querySelector('[data-field="mediaFolderId"]').value,
    driveFolderId: item.querySelector('[data-field="mediaFolderId"]').value,
    dmFileIds: normalizeIdList(item.querySelector('[data-field="dmFileIds"]').value),
    published: item.getAttribute('data-published') !== 'false',
    draftCreatedAt: item.getAttribute('data-created-order') || '',
    workFiles: JSON.parse(item.querySelector('[data-field="workFiles"]').value || '[]'),
    works: JSON.parse(item.querySelector('[data-field="workFiles"]').value || '[]')
  })));
}

function readRequestsFromDom() {
  return Array.from(document.querySelectorAll('[data-request-item]')).map((item) => ({
    caseId: item.getAttribute('data-id') || '',
    title: item.querySelector('[data-field="title"]').value.trim(),
    body: item.querySelector('[data-field="body"]').value.trim(),
    mediaFolderId: item.querySelector('[data-field="mediaFolderId"]').value,
    photoFolderId: item.querySelector('[data-field="mediaFolderId"]').value,
    mediaFileIds: normalizeIdList(item.querySelector('[data-field="mediaFileIds"]').value),
    published: item.getAttribute('data-published') !== 'false'
  }));
}

function validatePayloadForSubmit(payload) {
  const messages = [];
  function contentTitle(value, fallback, index) {
    return String(value || '').trim() || fallback + ' ' + (index + 1);
  }
  function add(label, field, hint) {
    messages.push(label + '：' + field + (hint ? '（' + hint + '）' : ''));
  }

  (payload.activityArticles || []).forEach((item, index) => {
    if (!String(item.title || '').trim()) add('活動記録・告知「' + contentTitle(item.title, '新規記事', index) + '」', '記事タイトル');
  });

  (payload.exhibitions || []).forEach((item, index) => {
    const label = '展示会「' + contentTitle(item.title, '新規展示会', index) + '」';
    if (!String(item.title || '').trim()) add(label, '展示会名');
  });

  (payload.requestCases || []).forEach((item, index) => {
    if (!String(item.title || '').trim()) add('取り組み事例「' + contentTitle(item.title, '新規事例', index) + '」', '取り組みタイトル');
  });

  if (!messages.length) return true;
  setStatus('入力が必要な項目があります。\n- ' + messages.join('\n- '), 'error');
  return false;
}

function buildPayloadFromDom() {
  if (isMediaDialogOpen()) {
    syncMediaEditorRowsToState();
    syncActiveMediaHiddenFields();
  }
  const recruitCalendars = readRecruitFromDom();
  return {
    recruitCalendars,
    recruitCalendar: (recruitCalendars.find((item) => item.published !== false) || recruitCalendars[0] || {}),
    activityArticles: readActivitiesFromDom(),
    exhibitions: readExhibitionsFromDom(),
    requestCases: readRequestsFromDom(),
    manualChangeNote: (document.getElementById('manualChangeNote') ? document.getElementById('manualChangeNote').value.trim() : (appState.state.manualChangeNote || ''))
  };
}


async function refreshMetaAfterDraftSave(currentPayload) {
  const data = await serverCall('getBootstrapData', appState.sessionToken);
  appState.options = data.options;
  appState.previewUrl = data.previewUrl || '';
  appState.drafts = data.drafts || [];
  appState.adminLog = data.adminLog || [];
  appState.maintenance = data.maintenance || appState.maintenance || { storage: null, recommendations: [] };
  appState.state = {
    ...(data.state || {}),
    ...(currentPayload || {}),
    changeLog: (data.state && data.state.changeLog) || appState.state.changeLog || []
  };
  renderAll();
  clearDirty();
}

async function loadDraftIntoEditor(draftId) {
  if (!confirm('現在の編集内容を下書きの内容で置き換えます。読み込みますか？')) return;
  try {
    setStatus('下書きを読み込んでいます…');
    const payload = await serverCall('loadDraft', appState.sessionToken, draftId);
    appState.state = { ...appState.state, ...payload };
    renderAll();
    markDirty();
    setStatus('下書きを読み込みました。', 'success');
  } catch (error) {
    setStatus(error.message, 'error');
  }
}

async function onSaveDraft() {
  try {
    const payload = buildPayloadFromDom();
    if (!confirm('現在の内容を新しい下書きとして保存しますか？')) return;
    setStatus('下書きを保存しています…');
    const result = await serverCall('saveDraft', appState.sessionToken, payload);
    setStatus(result.message, 'success');
    await refreshMetaAfterDraftSave(payload);
    clearDirty();
  } catch (error) {
    setStatus(error.message, 'error');
  }
}

async function onPublish() {
  try {
    const payload = buildPayloadFromDom();
    if (!validatePayloadForSubmit(payload)) return;
    if (!confirm('この内容で公開しますか？')) return;
    setStatus('公開処理を開始しています…');
    const result = await serverCall('publishState', appState.sessionToken, payload);
    setStatus(result.changeSummary || result.message, 'success');
    await loadBootstrap();
    clearDirty();
  } catch (error) {
    setStatus(error.message, 'error');
  }
}
function syncManualChangeNote() {
  const field = document.getElementById('manualChangeNote');
  appState.state.manualChangeNote = field ? field.value.replace(/\r\n?/g, '\n').replace(/^\n+|\n+$/g, '') : '';
}

</script>
